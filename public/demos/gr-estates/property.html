<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Property · G.R. Estates</title>
<meta id="meta-desc" name="description" content="Property details from G.R. Estates, independent estate and letting agents in Teesside."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--ink:#1b2430;--ink-soft:#2b3645;--orange:#e2672a;--orange-deep:#c2541d;--cream:#fbf7f2;--paper:#fff;--line:#e7ded3;--muted:#6c7686;--gold:#caa75a;--shadow:0 10px 30px rgba(27,36,48,.08);--shadow-lg:0 24px 60px rgba(27,36,48,.16);--r:16px;--maxw:1100px;--sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;--serif:'Fraunces',Georgia,serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  h1,h2,h3{font-family:var(--serif);font-weight:600;line-height:1.15;letter-spacing:-.01em}
  .btn{display:inline-flex;align-items:center;gap:.5rem;font-weight:600;font-size:.95rem;padding:.8rem 1.3rem;border-radius:999px;border:1.5px solid transparent;cursor:pointer;transition:.18s;font-family:inherit}
  .btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:var(--orange-deep)}
  .btn-ghost{border-color:var(--line);color:var(--ink);background:#fff}.btn-ghost:hover{border-color:var(--orange)}
  .banner{background:var(--ink);color:#fff;text-align:center;font-size:.8rem;padding:.5rem 1rem}.banner b{color:var(--gold)}
  header.nav{position:sticky;top:0;z-index:50;background:rgba(251,247,242,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
  .logo img{height:44px;width:auto}
  .gallery{margin:22px 0}
  .gmain{height:440px;border-radius:var(--r);overflow:hidden;background:#2b3645;position:relative}
  .gmain img{width:100%;height:100%;object-fit:cover}
  .chip{position:absolute;top:16px;left:16px;background:var(--orange);color:#fff;font-size:.78rem;font-weight:700;padding:.35rem .7rem;border-radius:6px;z-index:2}
  .chip.let{background:var(--ink)}
  .thumbs{display:flex;gap:10px;margin-top:10px;overflow-x:auto;padding-bottom:4px}
  .thumbs img{height:74px;width:104px;object-fit:cover;border-radius:8px;cursor:pointer;opacity:.7;flex:none;border:2px solid transparent}
  .thumbs img.active,.thumbs img:hover{opacity:1;border-color:var(--orange)}
  .pgrid{display:grid;grid-template-columns:1fr 360px;gap:34px;margin:14px 0 60px;align-items:start}
  .ptitle{font-size:clamp(1.6rem,3vw,2.2rem)}
  .pprice{font-family:var(--sans);font-weight:800;font-size:2rem;letter-spacing:-.02em;font-variant-numeric:tabular-nums;margin:.3rem 0}
  .pprice .pcm{font-size:.55em;color:var(--muted);font-weight:600}
  .facts{display:flex;gap:14px;flex-wrap:wrap;margin:20px 0}
  .facts .f{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:96px}
  .facts .f b{display:block;font-family:var(--sans);font-weight:800;font-size:1.35rem;letter-spacing:-.01em;line-height:1}
  .facts .f span{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
  .sec h2{font-size:1.3rem;margin:26px 0 12px}
  .desc{white-space:pre-line;color:var(--ink-soft)}
  .features{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .features li{padding-left:24px;position:relative;font-size:.93rem}.features li:before{content:"\2713";position:absolute;left:0;color:var(--orange);font-weight:700}
  .specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .specs div{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.9rem}.specs span{display:block;color:var(--muted);font-size:.74rem}
  .book{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;position:sticky;top:88px}
  .book h3{font-family:var(--serif);font-size:1.2rem;margin-bottom:.3rem}
  .book p.sub{font-size:.85rem;color:var(--muted);margin-bottom:8px}
  .book label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:10px 0 4px}
  .book input,.book textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:.6rem .7rem;font:inherit;background:var(--cream)}
  .book .btn{width:100%;justify-content:center;margin-top:16px}
  .book .call{display:block;text-align:center;margin-top:10px;font-size:.9rem;color:var(--muted)}
  footer{background:var(--ink);color:#aab2bd;padding:28px 0;font-size:.85rem;text-align:center;margin-top:20px}
  @media(max-width:820px){.pgrid{grid-template-columns:1fr}.gmain{height:300px}.book{position:static}.features{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="nav"><div class="wrap nav-inner">
  <a class="logo" href="/demos/gr-estates/"><img src="https://www.gr-estates.co.uk/static/images/logo-orange.aaf58e97174a.png" alt="G.R. Estates" referrerpolicy="no-referrer"></a>
  <a class="btn btn-ghost" href="/demos/gr-estates/#buy">← All properties</a>
</div></header>

<main class="wrap" id="main">
  <p id="status" style="padding:70px 0;text-align:center;color:var(--muted)">Loading property…</p>
</main>

<footer>© 2026 G.R. Estates · Stockton &amp; Normanby · 01642 378022 <span style="font-size:.7rem;opacity:.3;font-weight:500;margin-left:5px">v0.4</span></footer>

<script>
(function(){
  var id=new URLSearchParams(location.search).get('id');
  var main=document.getElementById('main');
  if(!id){ document.getElementById('status').textContent='No property selected.'; return; }
  function money(n){ if(n==null||n===0||isNaN(n)) return 'POA'; return '£'+Number(n).toLocaleString('en-GB'); }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function clean(h){ return (h||'').replace(/<\/p\s*>\s*<p[^>]*>/gi,'\n\n').replace(/<br\s*\/?>/gi,'\n').replace(/<\/?[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\n{3,}/g,'\n\n').trim(); }
  fetch('/api/property?id='+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok) throw 0; render(d);
  }).catch(function(){ document.getElementById('status').textContent='Sorry, we couldn\'t load this property. It may no longer be available.'; });

  function render(d){
    var isLet=d.kind==='let';
    var imgs=d.images||[];
    var chip=d.status||(isLet?'To Let':'For Sale');
    var price=money(d.price)+(isLet&&d.price?'<span class="pcm"> pcm</span>':'');
    var facts=[];
    if(d.beds) facts.push('<div class="f"><b>'+d.beds+'</b><span>Bedrooms</span></div>');
    if(d.baths) facts.push('<div class="f"><b>'+d.baths+'</b><span>Bathrooms</span></div>');
    if(d.receptions) facts.push('<div class="f"><b>'+d.receptions+'</b><span>Receptions</span></div>');
    if(d.type) facts.push('<div class="f"><b style="font-size:1rem">'+esc(d.type)+'</b><span>Type</span></div>');
    var specs=[];
    if(d.tenure) specs.push('<div><span>Tenure</span>'+esc(d.tenure)+'</div>');
    if(d.councilTaxBand) specs.push('<div><span>Council tax band</span>'+esc(d.councilTaxBand)+'</div>');
    if(d.heating) specs.push('<div><span>Heating</span>'+esc(d.heating)+'</div>');
    if(d.status) specs.push('<div><span>Status</span>'+esc(d.status)+'</div>');
    var feats=(d.features||[]).slice(0,12).map(function(f){return '<li>'+esc(f)+'</li>';}).join('');
    var main0=imgs[0]?'<img id="mainimg" src="'+imgs[0]+'" alt="'+esc(d.address)+'" referrerpolicy="no-referrer">':'<div style="height:100%;background:linear-gradient(135deg,#516a86,#8aa2bd)"></div>';
    var thumbs=imgs.slice(0,12).map(function(u,i){return '<img src="'+u+'" referrerpolicy="no-referrer" class="'+(i===0?'active':'')+'" onclick="setMain(this,\''+u+'\')">';}).join('');
    var desc=clean(d.description||d.location||'Contact us for full details on this property.');
    main.innerHTML=
      '<div class="gallery"><div class="gmain"><span class="chip'+(isLet?' let':'')+'">'+esc(chip)+'</span>'+main0+'</div>'+(imgs.length>1?'<div class="thumbs">'+thumbs+'</div>':'')+'</div>'+
      '<div class="pgrid"><div>'+
        '<h1 class="ptitle">'+esc(d.address)+'</h1>'+
        '<div class="pprice">'+price+'</div>'+
        (facts.length?'<div class="facts">'+facts.join('')+'</div>':'')+
        '<div class="sec"><h2>About this property</h2><div class="desc">'+esc(desc)+'</div></div>'+
        (feats?'<div class="sec"><h2>Key features</h2><ul class="features">'+feats+'</ul></div>':'')+
        (specs.length?'<div class="sec"><h2>The details</h2><div class="specs">'+specs.join('')+'</div></div>':'')+
        (d.virtualTour?'<div class="sec"><a class="btn btn-ghost" href="'+d.virtualTour+'" target="_blank" rel="noopener">▶ Virtual tour</a></div>':'')+
      '</div>'+
      '<aside><div class="book">'+
        '<h3>Book a viewing</h3><p class="sub">Arrange a viewing or ask us anything and we\'ll be straight back to you.</p>'+
        '<form onsubmit="return sendEnq(event)">'+
        '<label>Your name</label><input required name="name">'+
        '<label>Phone</label><input required name="phone" type="tel">'+
        '<label>Email</label><input name="email" type="email">'+
        '<label>Message</label><textarea name="message" rows="3">I\'d like to view '+esc(d.address)+'.</textarea>'+
        '<button class="btn btn-primary" type="submit">Request a viewing</button>'+
        '<span class="call">or call <b>01642 378022</b></span>'+
        '</form><div id="enqok" style="display:none;text-align:center;padding:14px 6px;color:var(--orange-deep);font-weight:600">Thanks! The team will be in touch shortly. ✓</div>'+
      '</div></aside>'+
      '</div>';
    document.title=d.address+' · '+price.replace(/<[^>]+>/g,'')+' · G.R. Estates';
    var md=document.getElementById('meta-desc'); if(md) md.setAttribute('content',(desc||'').slice(0,150));
    try{
      var ld={"@context":"https://schema.org","@type":"Residence","name":d.address,"description":(desc||'').slice(0,300)};
      if(d.price){ld.offers={"@type":"Offer","price":d.price,"priceCurrency":"GBP"};}
      if(imgs[0])ld.image=imgs[0];
      var s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify(ld);document.head.appendChild(s);
    }catch(e){}
  }
  window.setMain=function(el,u){ var m=document.getElementById('mainimg'); if(m)m.src=u; var ts=document.querySelectorAll('.thumbs img'); for(var i=0;i<ts.length;i++)ts[i].classList.remove('active'); el.classList.add('active'); };
  window.sendEnq=function(e){ e.preventDefault(); e.target.style.display='none'; var ok=document.getElementById('enqok'); if(ok)ok.style.display='block'; return false; };
})();
</script>
</body>
</html>
