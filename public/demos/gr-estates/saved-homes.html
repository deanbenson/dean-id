<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Saved homes · G.R. Estates</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
 :root{--ink:#2c2e33;--muted:#76726b;--ink-soft:#5f5b53;--orange:#e2672a;--orange-deep:#c2541d;--cream:#edeae6;--paper:#fff;--line:#e1dace;--panel:#e7e1d8;--sans:'Inter',-apple-system,sans-serif;--serif:'Quicksand',sans-serif;--r:16px;--shadow:0 10px 30px rgba(44,46,51,.08);--shadow-lg:0 18px 50px rgba(44,46,51,.14)}
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased}
 .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
 header{background:var(--panel);border-bottom:1px solid #ddd5c8}
 header .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;gap:14px}
 .logo img{height:30px;display:block}
 .back{font-weight:600;color:var(--ink);text-decoration:none;font-size:.92rem}
 .back:hover{color:var(--orange-deep)}
 .hd{padding:34px 0 8px}
 .hd .ey{font-family:var(--serif);font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:.74rem;color:var(--orange-deep)}
 .hd h1{font-family:var(--serif);font-weight:700;font-size:2rem;letter-spacing:-.01em;margin-top:5px}
 .hd p{color:var(--muted);margin-top:6px}
 .listings{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin:26px 0 60px}
 .card{display:block;background:var(--paper);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);transition:.2s;color:inherit;text-decoration:none}
 .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
 .ph{height:200px;position:relative;background:#2b3645 center/cover no-repeat;display:grid;place-items:end start}
 .chip{margin:12px;background:rgba(20,24,30,.74);color:#fff;font-size:.72rem;font-weight:600;padding:.28rem .6rem;border-radius:7px;text-transform:capitalize}
 .fav{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:var(--orange);color:#fff;font-size:1.08rem;line-height:1;cursor:pointer;display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.18);border:none;user-select:none;transition:.15s}
 .fav:hover{transform:scale(1.08)}
 .body{padding:18px 18px 20px}
 .price{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
 .price span{font-size:.62em;color:var(--muted);font-weight:600}
 .addr{color:var(--muted);font-size:.92rem;margin:.2rem 0 .9rem}
 .meta{display:flex;gap:1rem;font-size:.84rem;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:.8rem}
 .meta b{font-weight:600}
 .empty{text-align:center;padding:60px 24px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin:26px 0 60px}
 .empty .big{font-size:2.4rem}
 .empty h2{font-family:var(--serif);font-size:1.3rem;margin:10px 0 6px}
 .empty p{color:var(--muted);max-width:440px;margin:0 auto 18px}
 .btn{display:inline-block;background:var(--orange);color:#fff;font-weight:600;text-decoration:none;padding:.7rem 1.2rem;border-radius:10px}
 .btn:hover{background:var(--orange-deep)}
 .muted{color:var(--muted)}
 .sec{font-family:var(--serif);font-weight:700;font-size:1.2rem;margin:34px 0 2px}
 .sec.first{margin-top:24px}
 .fav.off{background:rgba(255,255,255,.92);color:var(--orange-deep)}
 @media(max-width:860px){.listings{grid-template-columns:repeat(2,1fr)}}
 @media(max-width:560px){.listings{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="wrap">
  <a class="logo" href="index.html"><img src="https://www.gr-estates.co.uk/static/images/logo-orange.aaf58e97174a.png" alt="G.R. Estates" referrerpolicy="no-referrer"/></a>
  <a class="back" href="index.html">← Back to site</a>
</div></header>
<div class="wrap">
  <div class="hd"><div class="ey">My G.R. Estates</div><h1>Saved &amp; recently viewed</h1><p id="sub" class="muted">Loading…</p></div>
  <div id="out"></div>
</div>
<script>
(function(){
  var out=document.getElementById('out'), sub=document.getElementById('sub');
  function savedMap(){ try{ var m=JSON.parse(localStorage.getItem('grSaved')||'{}'); return (m&&typeof m==='object'&&!Array.isArray(m))?m:{}; }catch(e){ return {}; } }
  function setMap(m){ try{ localStorage.setItem('grSaved',JSON.stringify(m)); }catch(e){} }
  function recentList(){ try{ var a=JSON.parse(localStorage.getItem('grRecent')||'[]'); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
  function isFav(id){ return !!savedMap()[String(id)]; }
  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function money(n,isLet){ if(n==null||n===''||isNaN(n)) return 'POA'; var s='£'+Number(n).toLocaleString('en-GB'); return isLet?s+' <span>pcm</span>':s; }
  function findDetail(id){ var r=recentList(); for(var i=0;i<r.length;i++){ if(String(r[i].id)===String(id)) return r[i]; } return savedMap()[String(id)]||null; }
  window.rm=function(e,id){ if(e){e.preventDefault();e.stopPropagation();} var m=savedMap(); delete m[String(id)]; setMap(m); load(); return false; };
  window.toggleSave=function(e,id){ if(e){e.preventDefault();e.stopPropagation();} id=String(id); var m=savedMap(); if(m[id]){ delete m[id]; } else { m[id]=findDetail(id)||{id:id}; } setMap(m); load(); return false; };
  function emptyState(){
    out.innerHTML='<div class="empty"><div class="big">🤍</div><h2>Nothing here yet</h2><p>Tap the heart on any property to save it, and homes you view will show up under Recently viewed. All kept on this device.</p><a class="btn" href="index.html#buy">Browse properties</a></div>';
    sub.textContent='Your shortlist lives here.';
  }
  function cardHTML(p,mode){
    var isLet=p.kind==='let';
    var img=p.image||(p.images&&p.images[0])||'';
    var ph=img?'<div class="ph" style="background-image:url(\''+esc(img)+'\')">':'<div class="ph">';
    var meta=[];
    if(p.beds) meta.push('<span><b>'+p.beds+'</b> bed'+(p.beds>1?'s':'')+'</span>');
    if(p.baths) meta.push('<span><b>'+p.baths+'</b> bath'+(p.baths>1?'s':'')+'</span>');
    if(p.type) meta.push('<span><b>'+esc(p.type)+'</b></span>');
    var heart;
    if(mode==='saved'){ heart='<span class="fav" role="button" tabindex="0" aria-label="Remove from saved" onclick="return rm(event,\''+esc(p.id)+'\')">♥</span>'; }
    else { var on=isFav(p.id); heart='<span class="fav'+(on?'':' off')+'" role="button" tabindex="0" aria-label="'+(on?'Saved':'Save')+'" onclick="return toggleSave(event,\''+esc(p.id)+'\')">'+(on?'♥':'♡')+'</span>'; }
    return '<a class="card" href="property.html?id='+encodeURIComponent(p.id)+'">'+ph
      +'<span class="chip">'+(isLet?'To let':'For sale')+'</span>'+heart+'</div>'
      +'<div class="body"><div class="price">'+money(p.price,isLet)+'</div>'
      +'<div class="addr">'+esc(p.address||'')+'</div>'
      +'<div class="meta">'+meta.join('')+'</div></div></a>';
  }
  function grid(items,mode){ return '<div class="listings">'+items.map(function(p){ return cardHTML(p,mode); }).join('')+'</div>'; }
  function load(){
    var m=savedMap(), saved=[], k; for(k in m){ if(m.hasOwnProperty(k)) saved.push(m[k]); }
    var recent=recentList();
    if(!saved.length && !recent.length){ emptyState(); return; }
    var html='<h2 class="sec first">Saved homes</h2>';
    if(saved.length){ html+=grid(saved,'saved'); }
    else { html+='<p class="muted" style="margin:2px 0 4px">Nothing saved yet — tap the heart on any home to keep it here.</p>'; }
    if(recent.length){ html+='<h2 class="sec">Recently viewed</h2>'+grid(recent,'recent'); }
    out.innerHTML=html;
    sub.textContent=saved.length+' saved · '+recent.length+' recently viewed · kept on this device';
  }
  load();
})();
</script>
</body>
</html>
