<div id="root"></div>
<script>
(function(){
  // Cloudflare Access guards the data endpoints at /api/admin/* with a per-person login.

  (function(){ var _f=window.fetch; window.fetch=function(u,o){

  var root=document.getElementById('root');

  function key(){ try{ return localStorage.getItem('grAdminKey')||''; }catch(e){ return ''; } }
  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function money(n){ if(n==null||isNaN(n)) return '—'; return '£'+Math.round(n).toLocaleString('en-GB'); }
  function ago(ts){ if(!ts) return ''; var s=Math.floor((Date.now()-ts)/1000); if(s<60)return 'just now'; var m=Math.floor(s/60); if(m<60)return m+' min ago'; var h=Math.floor(m/60); if(h<24)return h+' hr ago'; var d=Math.floor(h/24); return d+' day'+(d>1?'s':'')+' ago'; }
  function fmt(ts){ if(!ts)return ''; var d=new Date(ts); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
  function initials(n){ return (n||'').split(/\s+/).map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase(); }
  function srcLine(id){ return '<div class="srcline"><span class="vtag">v'+(VER[id]||'0.1')+'</span> <span aria-hidden="true">⚯</span> Data, '+esc(SRC[id]||'from the relevant system.')+'</div>'; }
  function ensureLocal(name){
    if(D['L_'+name]!==undefined) return;

    fetch('/api/local?name='+encodeURIComponent(name),{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){
      D['L_'+name]={rows:(d&&d.rows)||[],total:(d&&d.total)||0,at:(d&&d.synced_at)||null};
      if(ROUTE===name) renderView(false);
      if(d&&d.syncing&&!(d.rows&&d.rows.length)&&!D['L_'+name+'_retried']){ D['L_'+name+'_retried']=1; setTimeout(function(){ delete D['L_'+name]; ensureLocal(name); if(ROUTE===name)renderView(false); }, 9000); }
    }).catch(function(){ D['L_'+name]={rows:[],total:0,at:null}; if(ROUTE===name) renderView(false); });
  }

  function pageSyncLine(cad){ return syncCd(cad,' · next sync in '); }
  function smartDate(ts){
    if(ts==null||ts==='') return '—'; var d=(ts instanceof Date)?ts:new Date(ts); if(isNaN(d.getTime())) return '—';
    var now=Date.now(), diff=now-d.getTime();
    var tm=d.toLocaleTimeString('en-GB',{hour:'numeric',minute:'2-digit'}).replace(/\s/g,'').toLowerCase();

    if(d.getTime()>=sToday.getTime()-864e5) return 'Yesterday '+tm;
    if(now-d.getTime()<6*864e5 && d.getTime()<now) return d.toLocaleDateString('en-GB',{weekday:'short'})+' '+tm;
    if(d.getFullYear()===new Date().getFullYear()) return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});

    else if(ROUTE==='enquiries'||ROUTE==='feed') refreshEnquiries();
    else if(ROUTE==='viewings'||ROUTE==='valuations'||ROUTE==='contacts') reloadLocal(ROUTE);
  }
  function refreshSyncStatus(){ fetch('/api/sync-status',{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){ if(d&&d.datasets){ D.sync=d.datasets; if(ROUTE==='connections') renderView(false); } }).catch(function(){}); }
  function refreshEnquiries(){ fetch('/api/enquiries',{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){ if(d&&d.enquiries){ D.enquiries=d.enquiries; if(d.byKind)D.enqByKind=d.byKind; if(d.total!=null)D.enqTotal=d.total; if(d.synced_at)D.enqSyncedAt=d.synced_at; if(ROUTE==='enquiries'||ROUTE==='feed') renderView(false); } }).catch(function(){}); }

    fetch('/api/sync-now',{method:'POST',headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){

  };
  window.grProbe=function(){

    }).catch(function(){ if(b){b.disabled=false;b.textContent='Probe Street';} if(out)out.innerHTML='<div style="color:var(--orange-deep)">Probe error.</div>'; });
  };
  window.grAudit=function(){
    var b=document.getElementById('auditbtn'); if(b){b.disabled=true;b.textContent='Checking…';}

    var v=d.viewing||{}, prop=d.property||null, appl=d.applicant||null, own=d.owner||null, neg=d.negotiator||null, notes=d.notes||[], fb=d.feedback||[];

    var when=v.date?(function(){var dd=new Date(v.date); return isNaN(dd)?esc(String(v.date)):dd.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+', '+dd.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});})():'—';

    var timeline=tl?('<div class="secttl">Progression</div><div class="card" style="margin-bottom:8px">'+tl+'</div>'):'';
    function pcard(label,inner){ return '<div class="card" style="margin-bottom:8px"><div style="color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">'+esc(label)+'</div>'+inner+'</div>'; }

  function gsFlat(){ var f=[]; (GSRES||[]).forEach(function(g){ (g.items||[]).forEach(function(it){ f.push(it); }); }); return f; }
  window.grSearchInput=function(v){ GSQ=v; if(GST)clearTimeout(GST); if(!v||v.trim().length<2){ GSRES=null; GSSEL=-1; gsRender(); return; } GST=setTimeout(function(){ gsDo(v.trim()); }, 200); };
  function gsDo(q){ fetch('/api/hub-search?q='+encodeURIComponent(q),{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){ if((GSQ||'').trim()!==q)return; GSRES=(d&&d.groups)||[]; GSSEL=-1; gsRender(); }).catch(function(){}); }
  function gsRender(){
    var d=document.getElementById('gsdrop'); if(!d)return;
    if(GSRES==null){ d.classList.remove('show'); d.innerHTML=''; return; }
    if(!GSRES.length){ d.classList.add('show'); d.innerHTML='<div class="gsempty">No matches for "'+esc(GSQ)+'". New records appear as the next sync lands.</div>'; return; }
    var idx=-1;
    var html=GSRES.map(function(g){ return '<div class="gsgrp">'+esc(g.label)+' ('+g.items.length+')</div>'+g.items.map(function(it){ idx++; var i=idx; var ic=it.img?('<span class="gsic gsimg"><img src="'+esc(it.img)+'" alt="" loading="lazy"></span>'):('<span class="gsic">'+gsIcon(it.type)+'</span>'); return '<div class="gsitem'+(i===GSSEL?' sel':'')+'" onmousedown="grPickIdx(event,'+i+')">'+ic+'<span class="gsmain"><span class="gstitle">'+esc(it.title)+'</span><span class="gssub">'+esc(it.sub||'')+'</span></span><span class="gstype">'+esc(it.type)+'</span></div>'; }).join(''); }).join('');

  window.grPickIdx=function(e,i){ if(e&&e.preventDefault)e.preventDefault(); var f=gsFlat(); if(f[i])grPick(f[i]); };
  window.grSearchKey=function(e){ var f=gsFlat(); if(e.key==='ArrowDown'){ e.preventDefault(); if(f.length){ GSSEL=Math.min(GSSEL+1,f.length-1); gsRender(); } } else if(e.key==='ArrowUp'){ e.preventDefault(); if(f.length){ GSSEL=Math.max(GSSEL-1,0); gsRender(); } } else if(e.key==='Enter'){ if(f.length){ grPick(f[GSSEL>=0?GSSEL:0]); } } else if(e.key==='Escape'){ GSRES=null; gsRender(); var inp=document.getElementById('gsin'); if(inp)inp.blur(); } };

    if(!it)return;

  }

  var CHANGELOG=[
    {v:'0.90',d:'26 Jun 2026',items:['Sales now open as a full deal, not a one-line row. Click any sale to see both sides pulled live from Street: the price and status, the exchange and completion timeline, the buyer (with their position), the vendor, both solicitors, and the notes on the file. First result of a full data audit across every screen — tenancies, maintenance and more get the same treatment next.']},
    {v:'0.89',d:'26 Jun 2026',items:['Viewings come alive. Click any viewing (on the Viewings screen or a property) to open its full detail, pulled live from Street: who viewed it and how strong a buyer they are (lead rating, buying and financial position), the vendor, who conducted it, the date and time, whether it was confirmed or a no-show, plus every note and any written feedback with its interest and price rating. The Viewings list now opens straight into this detail. A viewing used to be a single line; now it tells the whole story.']},
    {v:'0.88',d:'26 Jun 2026',items:['A property now shows the real activity around it, pulled live from Street: every viewing, every offer (with amount and status), the sale itself, and the notes on the file. Until now the page looked empty because the synced viewings had lost their link to the property, so nothing joined up. We now read a property\'s activity live, so opening Mike Hind\'s 18 Runswick Road shows its 6 viewings, the offer and the agreed sale, and his profile shows those counts too. The underlying sync link will be repaired next so the Viewings screen groups by property as well.']},
    {v:'0.87',d:'26 Jun 2026',items:['Profile now surfaces the whole chain behind a valuation, not just the appraisal. For a vendor it shows who valued the property and from which branch, the date it was formally instructed, the price it was listed at, and a link straight to the property itself, where its viewings and enquiries are gathered. So opening Mike Hind now shows his appraisal at 18 Runswick Road, who did it, when it was instructed, what it went on at, and the activity around the sale, all pulled live from Street.']},
    {v:'0.86',d:'26 Jun 2026',items:['Profile polish: a valuation, viewing or offer now shows its address as clean text (e.g. "18 Runswick Road, Middlesbrough, TS6 8HG") instead of a raw data blob, with its date, status and amount alongside. So opening a vendor like Mike Hind now clearly shows the market appraisal we did for them.']},
    {v:'0.85',d:'23 Jun 2026',items:['Fix for the profile (v0.84): the live lookup was asking Street for relationships a record type does not have (like tenancies on a vendor), which made Street reject the whole call and return nothing. Each record is now asked only for its real relationships, so a vendor\'s valuations, a landlord\'s properties and a tenant\'s tenancy come through.']},
    {v:'0.84',d:'23 Jun 2026',items:['Contact profile now surfaces everything we hold on a person, pulled live from Street the moment you open it: the property they own or sell, plus their valuations (market appraisals), viewings, offers and tenancies, each with its date and status. Click a name anywhere and you see their whole history with you, so an early vendor like a recent market appraisal shows their valuation even before they are on the market.']},
    {v:'0.83',d:'23 Jun 2026',items:['Fix: a person\'s property now also reads from their vendor or landlord record, where the link actually lives, so a vendor reliably shows the home they are selling (not just the people who happen to own their listing under their person record).']},
    {v:'0.82',d:'23 Jun 2026',items:['Deep links are lighting up: a person\'s profile now shows the actual property they own or are selling through you, pulled live from Street the moment you open the profile, and linked straight to that property. A vendor finally shows the home they are selling, not just the label "vendor".']},
    {v:'0.81',d:'23 Jun 2026',items:['More of the web joined up: searching a person in the top search bar now jumps straight to their profile, and on a property\'s page the people who enquired are now links through to their own profiles. You can move from a property to the people around it, and from anyone back to everything you hold on them. On a profile, each enquiry now links through to the property it was about.']},
    {v:'0.80',d:'23 Jun 2026',items:['Joining the data up: names on the Enquiries screen now link straight to that person\'s full profile (matched by email), so you can jump from any enquiry to everything you hold on them. The profile also opens by email now, the universal join key. First step toward every record linking to the people and properties around it.']},
    {v:'0.79',d:'23 Jun 2026',items:['Contact profile now links a person to their role with you, not just their enquiries. It surfaces whether they are a vendor, landlord or tenant (matched on email), alongside any enquiries and requirements. The first version only matched enquiries, so a contact whose activity is a sale or a tenancy came up empty.']},
    {v:'0.78',d:'23 Jun 2026',items:['New contact profile: click any name on the Contacts screen to open everything we hold on that person in one place. Their details and the best ways to reach them at the top, then how many enquiries, viewing and valuation requests they have made, what they are looking for (budget and beds), and a searchable timeline of every enquiry. The first of bringing the data to life as a proper single view of each customer.']},
    {v:'0.77',d:'23 Jun 2026',items:['Enquiries now search and filter the whole list, not just what is on screen. There are 25,576 enquiries; the screen loads the most recent 2,000 for speed, so searching or filtering by type used to miss older ones and the chip counts only counted what was loaded. The chip counts are now the true totals, and the search box and the type filters query the full list on the server.']},
    {v:'0.76',d:'23 Jun 2026',items:['Search now covers the whole dataset, not just the rows on screen. The big lists (Contacts holds 15,875 records, Viewings 7,117) only load the latest 2,000 for quick browsing, so searching them used to miss older records. Typing in the search box on those now queries the full table on the server, so you will find any record however old. Smaller lists still search instantly in the browser.']},
    {v:'0.75',d:'23 Jun 2026',items:['Tidied every data table so the columns make sense. Columns that are empty for every record now hide automatically, so Viewings and Valuations drop the always-blank Branch column and Contacts drops the unused Contact and Status columns. The generic people and property tables no longer repeat the name or show empty Title or Deleted columns. Viewings and Valuations now show the appointment Type instead.']},
    {v:'0.74',d:'23 Jun 2026',items:['Connections: Rightmove now shows both halves built. The lead feed is live and the performance and inventory feed is built, with both awaiting Rightmove\'s signing secret and test keystore.']},
    {v:'0.73',d:'23 Jun 2026',items:['New Rightmove performance screen (under Insight). The read-only feed that pulls your Rightmove listing views, branch leads and live inventory (GetBranchPerformance + GetBranchPropertyList) is built and ready. It is secured by mutual-TLS and stays dormant until Rightmove issues the test keystore and our network/branch IDs, then the daily figures fill in here automatically.']},
    {v:'0.72',d:'23 Jun 2026',items:['Connections: Rightmove now shows as "Onboarding" — your account is verified and the lead webhook endpoint is live, now awaiting Rightmove\'s signing secret and a sandbox test. It sat under "Requested" before.']},
    {v:'0.71',d:'23 Jun 2026',items:['New Rightmove leads screen (under Pipeline). Your Rightmove account is verified and the secure webhook endpoint that receives leads is built and live, so every Rightmove enquiry will land in the hub the instant it is submitted — the applicant, how to reach them, the property they enquired about, whether they want a viewing, and, on lettings, their pre-qualification details. It switches on the moment Rightmove verifies the endpoint and issues our signing secret.']},
    {v:'0.70',d:'23 Jun 2026',items:['Connections: Rightmove now shows as "Requested" and in onboarding, since the read-only datafeed access request is in with Rightmove. It moves to live once they verify the account and we build the feed.']},
    {v:'0.69',d:'23 Jun 2026',items:['Small fix: the deposits count read "1 shown shown" after a search. Now reads correctly.']},
    {v:'0.68',d:'23 Jun 2026',items:['Tidied the Deposit protection table itself. It had no cell spacing and oversized text, so columns ran into each other and figures did not line up. It now has proper padding, a cleaner data size, aligned (tabular) numbers, and the long property addresses are kept in their own column so the amounts, references and dates have room to breathe.']},
    {v:'0.67',d:'23 Jun 2026',items:['Polished the Deposit protection screen: dates now read "26 Jul 2024" instead of raw 2024-07-26, statuses are tidy ("Held", "Closed"), and there is a new "To protect" column showing the days between you receiving each deposit and the scheme receiving it (turned red over the 30-day legal limit).','Added search and filtering to the deposits list: search by address, tenant or reference, and filter by Active, Held, Registered, Late, Closed or All. The compliance tiles are clickable too — tap "Protected late" to jump straight to those.']},
    {v:'0.66',d:'22 Jun 2026',items:['Fixed the real cause of the TDS import and read failing (an internal coding slip that made both calls error out). They work now.','Made the Deposit protection screen foolproof when it is empty: it explains what the screen does and walks you, step by step, through exactly how to get the export out of TDS and import it here.']},
    {v:'0.65',d:'22 Jun 2026',items:['Fixed the TDS deposit import failing on first use. The importer is now robust to how the database returns the new import id, and if anything ever does go wrong it reports a clear message instead of a generic error.']},
    {v:'0.64',d:'22 Jun 2026',items:['New Deposit protection screen (under Money). Import your TDS Custodial "deposit export" CSV straight into the hub and it stores the whole thing in the database — every column plus the full raw row, nothing dropped — with a log of each import (date and record count). It shows how many deposits are currently protected and the total held, and flags the compliance that matters: any protected outside the 30-day legal window, any where the tenancy has ended but the deposit is still held, and any protection expiring within 60 days. TDS Custodial now appears as a live connection on Connections']},
    {v:'0.63',d:'22 Jun 2026',items:['Found and fixed the real cause of the banner text running off the right edge: its "all good" state was sharing a style class with a status label used elsewhere, which forced the description onto a single line that never wrapped. That same root cause was behind the earlier button-wrapping too. The description now wraps neatly inside the card and the actions stay put beside the title']},
    {v:'0.62',d:'22 Jun 2026',items:['Settled the Connections status banner for good: the actions (last sync, Sync now, Data health) now sit on the top line beside the title, with the description on its own line underneath. Because the buttons share a line only with the short title and never with the description, the live record count loading in a second after the page opens can no longer push them onto a new line']},
    {v:'0.60',d:'22 Jun 2026',items:['The hub now sits behind a proper per-person login. Opening it asks for your email and a one-time code (Cloudflare Access) instead of one shared key, so each person signs in as themselves, you can add or remove people in a click, and every sign-in is logged','The client-data endpoints sit behind that same login now, not just the shared key, so client data can only be pulled once you are signed in','The public website, property search and reviews are untouched and stay open for customers']},
    {v:'0.59',d:'22 Jun 2026',items:['New "What needs you today" board across the top of Home — the hub now opens on the day\'s actions, pulled live from your Street data: leads to answer, viewings today, valuations booked this week, tenancies ending within 60 days, inspections due or overdue, and open maintenance jobs. Each is a count you can click straight through to','Added a "Today\'s diary" line-up of the actual viewings and valuations happening today, with times and clickable addresses, so the first thing you see each morning is your real schedule','The overview tiles (properties, branches, reviews and so on) move below the action board']},
    {v:'0.58',d:'22 Jun 2026',items:['Connections now shows PayProp as "Access requested, waiting on PayProp" with a "Requested" tag, rather than a plain "to connect". The API access request is in; once their team issues credentials it moves to live and the Money screens (rent roll, arrears, landlord payouts) light up']},
    {v:'0.57',d:'22 Jun 2026',items:['UptimeRobot fully wired up. Your public status page now shows both checks together — the website and the hub backend — and the "System status" link in your website footer points to it. The hub-backend check had its alarm condition the wrong way round (it flagged "operational" as a problem); that\'s corrected, so it reads Up when healthy']},
    {v:'0.56',d:'22 Jun 2026',items:['UptimeRobot is now live and watching from the outside. It pings your website and the hub backend every few minutes from outside Cloudflare, so if anything ever goes fully dark you get an email — even when no one is logged in. That is the one blind spot the in-hub board can\'t cover, because a self-check can\'t report its own death','Added a public status page your customers can check for reassurance, linked as "System status" in the website footer on every page','UptimeRobot moved out of "to connect" and into your live Connections, alongside Street, Google and the rest']},
    {v:'0.55',d:'22 Jun 2026',items:['System status: fixed the website row that briefly read "down". A worker isn\'t allowed to call its own public address, so the three website journeys are now checked at their real source inside the worker — the page through the assets layer, search through the live listings, reviews through the cached feed. Same truth, reads correctly now','Added a tiny public "liveness" endpoint (/api/up) so an outside monitor can confirm the hub backend is alive even though the hub itself is private and admin-only — the groundwork for UptimeRobot','Added UptimeRobot to your Connections stack: independent, outside-the-building uptime monitoring plus a public status page your customers can check for reassurance']},
    {v:'0.54',d:'22 Jun 2026',items:['New System status screen — a live "is everything up and running?" board for the whole business. A light only glows green if the hub actually probed that system and it answered just now; nothing is ever a decorative green','It tests real journeys, not just servers: your website is checked by actually loading a page, running a property search and pulling the reviews feed — the things a buyer does. Street, Google and the AI assistant are each really pinged too','Each system shows its response time and a rolling uptime %, with a plain-English line on what it means for your customers if it dips. The dots beat like a heartbeat, faster when a system is snappy','An always-on health dot now sits by the hub name in the sidebar, so you can see at a glance from any screen that everything is live — click it to open the full board','Honest by design: things we cannot truly check yet (the phone system, Rightmove, OnTheMarket, PayProp and the rest) are shown as a clear grey "not monitored yet" with what it would take to light them up, rather than a guessed green']},
    {v:'0.53',d:'22 Jun 2026',items:['Listings now reads 100% in the Diagnose table instead of a blank "—". It holds all 183 of your live on-market properties — a complete set — but because Street keeps no "all listings ever" figure to compare against, it was showing "—", which next to a column of 100%s looked like it wasn\'t coming through. It is: confirmed live through both the sync and the website search path. Now shown as 183 / 183, 100%, Complete']},
    {v:'0.52',d:'22 Jun 2026',items:['Fixed listings showing amber "Filling" forever in the Diagnose report. Listings is your live on-market set, so Street keeps no "all listings ever" total to measure it against — with nothing to compare to, the status wrongly fell through to "Filling". A dataset we hold in full now reads green "Complete", and its coverage shows "—" rather than a made-up percentage','Same fix stops the odd "25,450 / 1" reading on enquiries: when a stored total is missing or briefly stale, the hub no longer prints a misleading ratio and just shows what we hold','Under the hood: the read-only copy of Street now lives in clearly labelled "street_" tables (street_viewings, street_tenancies and so on), so every feed\'s source is obvious at a glance and a second system later (payments, portals) can sit alongside it without any name clashes. Your live website tables are untouched, and all existing data was preserved by renaming in place — nothing had to re-sync']},
    {v:'0.51',d:'21 Jun 2026',items:['Fixed the nonsense "157% of Street" figure. Cause: once a feed finishes its full backfill it only pulls recently-changed records, and the page total for that small slice (e.g. "1") was overwriting the real dataset total — so enquiries\' total read 1 instead of 25,444. The sync now re-reads the true total cleanly in top-up mode','Belt and braces: the coverage figure is now capped per dataset and can never read over 100% again, even if a total is briefly wrong']},
    {v:'0.50',d:'21 Jun 2026',items:['Fixed the Connections header overlapping the Sync now / Data health buttons. The text now wraps in its own column and the buttons keep their own space, on any screen width']},
    {v:'0.49',d:'21 Jun 2026',items:['Fixed the empty Branch column on Viewings (and Valuations and Offers). Checked a real record: a viewing does link to a branch, but Street only returns that link, not the branch name, unless you explicitly ask for it. The sync now asks Street to include the branch, so the office name comes through and fills in as records re-sync','Same fix makes the property on each viewing clickable through to its full property page, which loads live from Street','Both fill in as the viewings feed re-walks itself']},
    {v:'0.48',d:'21 Jun 2026',items:['Every data screen (Viewings, Valuations, Contacts, Sales, Tenancies and the rest) now opens with an at-a-glance summary above the table — added this month, plus the main status split — so you read the shape of it before the detail, the same idea as the new Connections page','Done once in the shared table component, so it lands consistently across the whole hub']},
    {v:'0.47',d:'21 Jun 2026',items:['Redesigned the Connections page around the person using it, not the engineer who built it. It opens with a plain status — connected and syncing, how many records held — then your live connections, the business numbers your hub holds (properties, contacts, enquiries, viewings, valuations, sales, tenancies), and the wider stack still to plug in','All the technical detail (coverage per dataset, backfill progress, errors) now lives behind the Data health button, on demand, instead of filling the page']},
    {v:'0.46',d:'21 Jun 2026',items:['Right-sized the pulls so a single sync run stays comfortably under the 1,000-call ceiling. The previous setting was so aggressive (8 big datasets at once) it occasionally blew even the paid limit, which is why the last dataset in a run (valuations) showed "too many subrequests". Now 6 datasets a run with big pulls — fast, and safely within budget']},
    {v:'0.45',d:'21 Jun 2026',items:['Now on the Cloudflare paid plan, which lifts the per-run call ceiling from 50 to 1,000. That was the real wall behind the "too many subrequests" error the diagnostics caught','With the headroom, the pulls are turned right up: each sync now works more datasets and pulls far more pages per run, so the remaining back-history (contacts especially) lands in just a few passes','The earlier red "build failed" was only the cron-schedule step on the free plan; the worker code itself deployed fine throughout']},
    {v:'0.44',d:'21 Jun 2026',items:['Push to 100%: each sync now works the datasets that are furthest behind first, and pulls more pages per run, so the big back-histories (contacts 16k, viewings 7k) finish in a handful of passes instead of dozens','Click Sync now a few times to drive it home, or leave the 15-minute cron to finish it hands-off. Everything already stored stays perfect; this is just the remaining history streaming in']},
    {v:'0.43',d:'21 Jun 2026',items:['Diagnose now groups the two feeds that share a table (sales + lettings offers, and applicants) into one row, so the totals stop being double-counted and the overall figure can no longer read over 100%','Tidied the "last sync" line so it no longer shows a stale empty-count that disagreed with the live one']},
    {v:'0.42',d:'21 Jun 2026',items:['Simplified the Connections controls from five buttons to two: Sync now, and one Diagnose','Diagnose is now a single health report: a plain-English verdict at the top (how many datasets are complete, filling or empty, and how much of Street we hold overall), a short "needs attention" list if anything is wrong with the exact reason, and a clean per-dataset table of coverage and status. Probe, Check data and Test sync are folded into it']},
    {v:'0.41',d:'21 Jun 2026',items:['Cleared the red "no such table" lines in Diagnose. They were never sync failures: the checker was counting rows in tables that had not been created yet because those datasets had not had a first sync. Every table is now created up front (empty, ready), so the message is gone and unsynced datasets simply read as 0','A not-yet-created table is no longer treated as an error anywhere']},
    {v:'0.40',d:'21 Jun 2026',items:['With the speed fixed, datasets are landing at 100% (sales, tenancies, property keys, maintenance, interested applicants all complete and matching Street field-for-field)','Sync now fills the EMPTY datasets first again, so the ones stuck at 0 jump the queue instead of waiting for the rotation to wrap round. Uses a fast row-count check, not the heavy pre-pass that caused the earlier timeout','Diagnose shows how many datasets are still empty so you can watch the number fall to zero']},
    {v:'0.39',d:'21 Jun 2026',items:['The Test sync proved storage was never the problem: one dataset stored all 378 rows perfectly. The real bottleneck was speed. Street is slow (about 2 seconds a page), so fetching pages one at a time made each dataset take ~9 seconds and the background sync ran out of time before it could store anything','Now each dataset fetches its pages in parallel, cutting it to ~2-3 seconds, and Sync now runs the work directly and reports back what it synced the moment it finishes, instead of handing off to a background task that could be cut short','Net effect: click Sync now and watch the datasets actually fill, a batch at a time']},
    {v:'0.38',d:'21 Jun 2026',items:['New Test sync button: runs one dataset (tenancies) sync right now, inline, and reports the exact truth in seconds — rows before, rows after, what stored, and the precise error if it stores nothing. No background timing, no ambiguity','This is the definitive end to guesswork: one click tells us whether storing a Street dataset works, and if not, exactly why']},
    {v:'0.37',d:'21 Jun 2026',items:['Found why the Street datasets stopped filling: enquiries and the rest were sharing one sync run, and the heavy new prioritising step was timing the run out right after enquiries finished, so everything else got killed before it could even start, or log why','Fix: enquiries and the other datasets now run in separate passes, each with a full budget, and the heavy prioritising step is gone. The datasets fill steadily as the rotation comes round','Sync now drives the stuck datasets directly, and a heartbeat is written before any work so a stall can never again hide from Diagnose']},
    {v:'0.36',d:'21 Jun 2026',items:['Closed the last blind spot: the new prioritised sync does bookkeeping queries up front, and if THAT hit a Cloudflare limit it was still failing silently. It is now wrapped so any such error is captured and shown in Diagnose','Diagnose now shows what the last sync rotation actually picked to work on, so you can see it moving through the backlog','This makes the next Diagnose definitive: if a dataset still will not fill, the reason will be on screen']},
    {v:'0.35',d:'21 Jun 2026',items:['Error checking, 10x. Every sync now records exactly what it did at each stage (pulled, mapped, stored) and the precise reason for any failure, including the exact database message and which record, and any Cloudflare limit. Nothing is swallowed as a vague "no rows"','New Diagnose button shows it all: a live feed of the most recent errors, and per dataset the fetched-mapped-stored flow, what the self-repair did, missing columns, and the last error in plain text','Fixed a real bug the old checking hid: the schema repair was DROPPING a table to rebuild it, which briefly wiped Viewings to 0. It now adds the missing columns in place instead, so a populated table can never be emptied','Empty datasets are now filled first, so anything stuck at 0 races to 100% instead of waiting hours for its turn']},
    {v:'0.34',d:'21 Jun 2026',items:['Fixed the real reason whole datasets (tenancies, vendors, landlords, tenants, inspections, offers) sat at 0 while pulling rows fine. Two faults stacked: their tables had been created in an older, narrower shape and the database will not silently widen an existing table, so every save bounced off the missing columns; and once a walk finished without saving anything, the dataset was wrongly marked complete and stopped retrying','The sync now self-heals on both counts. If a table is the wrong shape it rebuilds it correctly; if a dataset is empty while Street holds rows and it thinks it is finished, it re-arms and walks the full history again. Nothing is ever lost (Street is the source of truth) and tables already correct (Sales, Contacts, Viewings, Valuations, Applicants) are left untouched','The repair runs across every dataset at the start of a single sync, so one cycle (or one Sync now) corrects them all rather than waiting for the rotation to come round','Reads the table definition from the database catalogue, which always works, so the check is reliable']},
    {v:'0.33',d:'21 Jun 2026',items:['First cut of the schema self-heal (superseded by 0.34)']},
    {v:'0.32',d:'21 Jun 2026',items:['Each dataset card now shows what we hold of how many Street has, with a live coverage % (e.g. 1,600 of 7,117 · 22%) so you can watch it climb to 100%','Street totals captured during the sync, so no extra live calls']},
    {v:'0.31',d:'21 Jun 2026',items:['The audit proved the data is structurally perfect (100% field and value parity); the only gap was coverage, and we found why: each schema update was dropping tables and resetting the sync to the start, so it kept restarting and never finished','The migration is now non-destructive — nothing is ever dropped or reset again, so coverage climbs to 100% and stays there','Sped the backfill up (bigger batches, more datasets per cycle) so the full history lands in a few hours']},
    {v:'0.30',d:'21 Jun 2026',items:['New Check data button audits the local copy against live Street, field by field: coverage (how much of Street we hold), field parity (every field present) and value match — objective proof the data is clean and complete','Feed screens for everything: Sales, Vendors, Landlords, Tenants, Solicitors, All properties, Property keys, Tenancies, Inspections, Maintenance and Move-outs, each browsable with the full-record drawer']},
    {v:'0.29',d:'21 Jun 2026',items:['Every Street dataset now stores one real column per field, named exactly as the API names them (plus the full raw record) — a proper warehouse, matched 100% to Street','Field lists taken straight from the live API for every resource: properties (40 fields), tenancies, vendors, tenants, landlords, solicitors, todos, instructions and the rest','Now talking to the documented production server, street.co.uk/open-api/v1']},
    {v:'0.28',d:'21 Jun 2026',items:['Read the actual Street Open API spec (every path, verified) — no more guessing. Now importing every GET-listable resource exactly as documented: interested applicants, property keys, maintenance jobs, move-outs, solicitors, to-dos and to-do types, follow-ups, invoices, photos & measures, all instructions, areas, brands, companies, branches and users','Corrected wrong guesses against the spec: Tasks is really /todos, photos are /photo-and-measures; and activity/documents/notes/maintenance-requests are POST-only so they are not listed','Probe now uses the official paths and links to the Street API reference']},
    {v:'0.27',d:'21 Jun 2026',items:['Probe confirmed the full Street surface — now importing all of it: every property (1,556, not just the 180 on-market), vendors (1,783), tenants (562), landlords (255), sales/completions (534), tenancies (378) and inspections (163), every field of each','Dropped the endpoints Street does not expose for this account (progressions, keys, maintenance, certificates — those live in Fixflo and the other systems)','That is the whole of Street that holds data, now mirrored locally']},
    {v:'0.26',d:'21 Jun 2026',items:['Push for Street 100%: Probe Street now tests every candidate endpoint (progressions, tenancies, landlords, keys, maintenance, inspections, notes, documents, transactions and more) and shows up to 40 fields each','New generic capture mirrors any Street resource in full — every field — so nothing is left out; started wiring sales progressions, tenancies and landlords','Corrected the wording: Street and Google are the external systems, the rest is your own website and hub capture']},
    {v:'0.25',d:'21 Jun 2026',items:['We now keep the COMPLETE raw Street record for every row, so every field is captured even ones we have no column for','Click any row on Enquiries, Viewings, Valuations or Contacts to open a drawer showing every single field','Empty viewings/valuations/offers tables rebuilt cleanly and the sync now reports the exact database error if an insert ever fails (no more silent failures)']},
    {v:'0.24',d:'21 Jun 2026',items:['Found it: viewings (7,117), valuations (1,071) and offers (1,248) were fetching fine but failing to store because Street sends the address as a structured object — binding that to a text column silently killed every insert','Now coerced to clean text, and those datasets reset to re-pull their full history from the start']},
    {v:'0.23',d:'21 Jun 2026',items:['Enquiries backfill confirmed working (climbing past 2,890 and counting)','Added a Probe Street button on Connections: asks Street directly what its viewings, valuations and offers endpoints actually return, so we wire them from fact instead of guesswork']},
    {v:'0.22',d:'21 Jun 2026',items:['The local copy now holds EVERYTHING: each dataset backfills its entire history from Street a chunk at a time, then just tops up with new and changed records','Connections shows backfill progress live as it walks each dataset','Hub pages now read up to 2,000 rows (was 200); the top-bar search still covers the full set']},
    {v:'0.21',d:'21 Jun 2026',items:['Viewings and valuations now sync too: those Street endpoints quietly ignore the incremental filter, so we now pull their most recent records directly when it comes back empty','Applicants (617) and contacts (800) confirmed flowing after the staggered-sync fix']},
    {v:'0.20',d:'21 Jun 2026',items:['Fixed the first sync: the viewings, valuations, applicants, offers and contacts feeds now backfill reliably by spreading the work across cron ticks instead of overwhelming one run','Each dataset now reports exactly what Street returned (status, rows, any error) so nothing fails silently','The cursor only moves forward once data actually lands, so a failed run retries instead of skipping']},
    {v:'0.19',d:'21 Jun 2026',items:['Search results now show a property photo where we have one','Listings can be filtered by sale or let, bedrooms and price, on top of search','Save any property and jump back to your recently viewed ones, both on the home page','Property pages show the handling office, drawn from that property\'s own activity']},
    {v:'0.18',d:'21 Jun 2026',items:['Next sync is now a live countdown that ticks down every second, on Connections and on every data page','Sync now button to pull straight from Street without waiting for the timer','Empty datasets trigger their own sync the moment you open them, then fill themselves','Pages refresh automatically as each sync lands']},
    {v:'0.17',d:'21 Jun 2026',items:['Intelligent search in the top bar: type anything (address, name, email, phone) and jump straight to a property, enquiry, contact, viewing or valuation','Connections now shows time until the next sync, plus new-today and last-sync counts per dataset','Google reviews show the most recent review date and when they were last checked','Branch review status fixed (was stuck on "reviews syncing" due to a name mismatch)']},
    {v:'0.16',d:'21 Jun 2026',items:['Every data screen now has instant search, click-to-sort columns and clear human dates (just now, Yesterday 4:32pm)','New property command view: open any property to see who enquired, viewings, an enquiries-per-week chart and live counts','Status shown as colour-coded pills throughout']},
    {v:'0.15',d:'21 Jun 2026',items:['Viewings, Valuations and Contacts pages now live, read instantly from the local copy','Owner home shows real valuations and viewings booked this week']},
    {v:'0.14',d:'21 Jun 2026',items:['All core Street data now syncs into the local copy on a cron: viewings, valuations, applicants, offers and contacts','Connections shows what is in the local copy, per dataset','Role preview moved into your profile as Assume a colleague\'s view']},
    {v:'0.13',d:'21 Jun 2026',items:['Enquiries now read from a fast local copy synced from Street every 15 minutes, instant and always newest','Connections shows what data is flowing in and the split across systems','Cross-links to the real systems throughout']},
    {v:'0.12',d:'21 Jun 2026',items:['Cross-links: Connections opens each system, Reviews open in Google, enquiries link to the property, home tiles jump to their page']},
    {v:'0.11',d:'21 Jun 2026',items:['Enquiries now reads every enquiry in Street, website, portals and phone, not just our captures','Company feed streams the real Street enquiry activity']},
    {v:'0.10',d:'21 Jun 2026',items:['Staff page v3: grouped by department, with Google-review praise matched to each person','Connections corrected, SignRequest not DocuSign']},
    {v:'0.9',d:'21 Jun 2026',items:['Live Company feed (auto-updating)','Staff v2 with richer profiles','Connections shows your full real system stack','Sticky user block, logo to home','Per-page versions + this changelog']},
    {v:'0.8',d:'21 Jun 2026',items:['Honest data source on every page','Live branches and staff (no hardcoding)','Profile view, admin-only role preview','Phone status corrected']},
    {v:'0.7',d:'21 Jun 2026',items:['Business-level owner home','Shareable URLs, no-jump navigation','Enquiries moved into the hub']},
    {v:'0.6',d:'20 Jun 2026',items:['The Hub app: sidebar + Ask Georgina copilot','Live Home, Connections, Listings, Reviews, Roadmap']},
    {v:'0.5',d:'20 Jun 2026',items:['Instant valuation funnel','Be-first property alerts into Street','Saved and recently viewed homes']},
    {v:'0.4',d:'20 Jun 2026',items:['Leads inbox / Hub v1','Live Google reviews','Lead capture into Street']}

  var SOONCFG={
    valuations:{features:['Booked valuations and the diary','Outcomes: instructed or not','Valuer performance'],scope:function(D){return [{n:(D.leads||[]).filter(function(L){return L.kind==='valuation';}).length,l:'Valuation enquiries'}];}},
    viewings:{features:['Every viewing with feedback','Automatic feedback requests','Viewings by property'],scope:function(D){return [{n:(D.leads||[]).filter(function(L){return L.kind==='viewing';}).length,l:'Viewing requests'}];}},
    progression:{features:['Offer to completion tracking','Chain view','Stall alerts'],scope:function(D){return D.portfolio?[{n:D.portfolio.sale,l:'For sale now'}]:[];}},

  }
  var FEEDTIMER=null;
  function startFeed(){ if(FEEDTIMER) return; FEEDTIMER=setInterval(function(){ if(ROUTE!=='feed'){ stopFeed(); return; } fetch('/api/enquiries',{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){ if(d&&d.enquiries){ D.enquiries=d.enquiries; if(d.total!=null)D.enqTotal=d.total; if(ROUTE==='feed') renderView(false); } }).catch(function(){}); }, 40000); }
  function stopFeed(){ if(FEEDTIMER){ clearInterval(FEEDTIMER); FEEDTIMER=null; } }
  function viewSoon(id){
    var it=findItem(id); var cfg=SOONCFG[id]||{};
    var scope=cfg.scope?cfg.scope(D):[];
    var tiles=scope.length?('<div class="tiles">'+scope.map(function(s){return tile(s.n,s.l);}).join('')+'</div>'):'';
    var feats=(cfg.features||[]).map(function(f){return '<div class="row"><span class="ic">○</span>'+esc(f)+'</div>';}).join('');
    return '<h2 class="vt">'+esc(it?it.l:'Coming soon')+' <span class="vtag big">planned</span></h2><div class="vsub">'+esc(SOON[id]||'Part of the Hub, coming soon.')+'</div>'
      +(tiles?('<div class="secttl">Already in your data</div>'+tiles):'')
      +(feats?('<div class="secttl">What this page will do</div><div class="card">'+feats+'</div>'):'<div class="soon"><div class="bg">On the way</div><div class="tag">Planned</div></div>');
  }
  function viewChangelog(){
    var rows=CHANGELOG.map(function(r){ return '<div class="card" style="margin-bottom:11px"><div style="display:flex;align-items:baseline;gap:9px;margin-bottom:7px"><span style="font-family:var(--serif);font-weight:700;font-size:1.05rem">v'+esc(r.v)+'</span><span style="color:var(--muted);font-size:.82rem">'+esc(r.d)+'</span></div>'+r.items.map(function(i){ return '<div class="row"><span class="ic" style="color:var(--g)">✓</span>'+esc(i)+'</div>'; }).join('')+'</div>'; }).join('');
    return '<h2 class="vt">What\'s new</h2><div class="vsub">Hub v'+HUB_VERSION+' · built '+BUILD+'. Every release, newest first.</div>'+rows;
  }

  function viewProfile(){
    var who=WHO[ROLE]||['Georgina','Owner']; var ini=who[0].split(/\s+/).map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase();
    var allowed=ROLES[ROLE].nav; var mods=[];
    NAV.forEach(function(g){ g.items.forEach(function(it){ if(allowed==='all'||allowed.indexOf(it.id)>=0) mods.push(it.l); }); });
    var chips='<div class="chips">'+mods.map(function(m){ return '<span class="chip" style="cursor:default">'+esc(m)+'</span>'; }).join('')+'</div>';
    var assumeOpts=[['manager','a manager'],['negotiator','a negotiator'],['marketing','Tia (marketing)'],['accounts','Rosie (accounts)']];
    var aBtns=assumeOpts.map(function(o){ return '<button class="chip'+(ROLE===o[0]?' on':'')+'" onclick="grRole(\''+o[0]+'\')">Assume '+esc(o[1])+'</button>'; }).join('');
    var aExit=(ROLE!=='owner')?'<button class="btn btn-p" style="margin-top:12px" onclick="grRole(\'owner\')">Back to my own view</button>':'';
    var assume='<div class="secttl">Assume a colleague\'s view</div><div class="card"><div style="color:var(--muted);font-size:.86rem;margin-bottom:11px">See the Hub exactly as a colleague would, a preview for building and testing, not a real login. '+(ROLE!=='owner'?('You\'re currently assuming <b>'+esc((WHO[ROLE]||['',''])[1])+'</b>.'):'')+'</div><div class="chips">'+aBtns+'</div>'+aExit+'</div>';
    return '<h2 class="vt">Your profile</h2><div class="vsub">Who you are in the Hub, and what you can see.</div>'
      +'<div class="card" style="display:flex;align-items:center;gap:14px"><span class="av" style="width:48px;height:48px;font-size:1rem">'+esc(ini)+'</span><div><div style="font-family:var(--serif);font-weight:700;font-size:1.2rem">'+esc(who[0])+'</div><div style="color:var(--muted)">'+esc(who[1])+(allowed==='all'?' · full access':'')+'</div></div></div>'
      +assume
      +'<div class="secttl">What this role can access</div>'+chips
      +'<div class="card" style="margin-top:16px;color:var(--muted);font-size:.86rem">Truthfully: you\'re signed in on the shared admin key that you and Georgina use to build this out, so this is a role preview, not a personal account yet. Individual logins, each person with their own secure sign-in and exactly their role\'s access, are on the roadmap. Use "View as" at the top to preview any role.</div>'
      +'<button class="btn" style="margin-top:16px" onclick="grLogout()">Sign out</button>';
  }
  function viewFor(id){
    var body;
    if(id==='profile')body=viewProfile();
    else if(id==='home')body=roleHome();
    else if(id==='connections')body=viewConnections();
    else if(id==='deposits')body=viewDeposits();
    else if(id==='rightmove')body=viewRightmove();
    else if(id==='rmperf')body=viewRmPerf();
    else if(id==='status')body=viewStatus();
    else if(id==='ask')body=viewAsk();
    else if(id==='enquiries')body=viewEnquiries();
    else if(id==='listings')body=viewListings();
    else if(id==='reviews')body=viewReviews();
    else if(id==='roadmap')body=viewRoadmap();
    else if(id==='staff')body=viewStaff();
    else if(id==='feed')body=viewFeed();
    else if(id==='changelog')body=viewChangelog();
    else if(id==='viewings')body=viewViewings();
    else if(id==='valuations')body=viewValuations();
    else if(id==='contacts')body=viewContacts();
    else if(id==='property')return viewProperty();
    else if(id==='contact')return viewContact();
    else if(id==='viewingdetail')return viewVw();
    else if(id==='saledetail')return viewSale();
    else if(GENVIEWS[id])body=viewGeneric(id,GENVIEWS[id]);
    else body=viewSoon(id);
    return body+srcLine(id);
  }
  function viewGeneric(name,title){
    ensureLocal(name); var L=D['L_'+name]; if(!L) return localLoading(title);
    var sub='<h2 class="vt">'+esc(title)+'</h2><div class="vsub">From your local copy, synced from Street. '+(L.total||0).toLocaleString('en-GB')+' total'+localSync(L)+pageSyncLine('15min')+'.</div>';
    if(!L.rows.length) return sub+localEmpty(name,'15min');
    var allKeys=Object.keys(L.rows[0]).filter(function(k){return k!=='id'&&k!=='raw';});
    allKeys=allKeys.filter(function(k){return L.rows.some(function(r){var v=r[k];return v!=null&&v!==''&&v!=='{}'&&v!=='[]';});});
    if(allKeys.indexOf('full_name')>=0||allKeys.indexOf('name')>=0){ allKeys=allKeys.filter(function(k){return ['first_name','last_name','forename','surname','middle_name'].indexOf(k)<0;}); }
    var pref=allKeys.filter(function(k){return /full_name|^name$|address|title|^status$|amount|price|rent|^start$|start_date|due_date|inspection_date|move_out_date|created_at/.test(k);});
    var disp=pref.concat(allKeys.filter(function(k){return pref.indexOf(k)<0;})).slice(0,6);
    var cols=disp.map(function(k){ return {key:k,label:k.replace(/_/g,' '),
      html:function(r){ var v=r[k]; if(v==null||v==='')return '—'; var s=String(v); if(s.charAt(0)==='{'||s.charAt(0)==='[')return '<span style="color:var(--muted)" title="structured field — open the row to see it">…</span>'; if((/_at$|_date$|^start$|^end$/.test(k))&&/^\d{4}-\d\d-\d\d/.test(s))return smartDate(s); if(/price|amount|fee|rent|deposit/.test(k)&&/^-?\d+(\.\d+)?$/.test(s))return '£'+Number(s).toLocaleString('en-GB'); if(s.length>60)return esc(s.slice(0,60))+'…'; return esc(s); },
      sortVal:function(r){ var v=r[k]; if(/_at$|_date$|^start$|^end$/.test(k))return v?new Date(v).getTime():0; if(/price|amount|fee|rent|deposit/.test(k))return Number(v)||0; return v==null?'':String(v); },
      text:function(r){return r[k];} }; });
    if(name==='sales'){ cols.push({key:'_sale',label:'',html:function(r){return r.id?('<a class="syslink" href="#sale='+encodeURIComponent(r.id)+'">Detail ›</a>'):'';},sort:false,search:false}); }
    return sub+dataTable('gen_'+name,L.rows,cols,'Search '+esc(title)+'…',name,{name:name,total:L.total||0});
  }

  // ---- Live system health ---------------------------------------------------------------------
  function hStatusCol(s){ return s==='up'?'#157a5b':s==='slow'?'#a96514':s==='down'?'#c2541d':'#8a8780'; }
  function hStatusWord(s){ return s==='up'?'Operational':s==='slow'?'Slow':s==='down'?'Down':'Not monitored'; }
  function hbDur(ms){ return (1.4+Math.min(1.5,(ms||300)/1400)).toFixed(2); }
  function updatePip(overall){ var p=document.getElementById('healthpip'); if(!p)return; p.className='hpip '+(overall||'up'); p.style.setProperty('--hb',hbDur(300)+'s'); p.title='System status — '+(overall==='up'?'all operational':overall==='slow'?'running slow':overall==='down'?'attention needed':'checking…'); }
  function ensureHealth(force){
    if(!force && D.health!==undefined) return;
    if(D.health===undefined) D.health=null;
    fetch('/api/health'+(force?'?force=1':''),{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){
      D.health=d; if(d&&d.ok) updatePip(d.overall); if(ROUTE==='status') renderView(false);
    }).catch(function(){ if(!D.health){ D.health={ok:false}; if(ROUTE==='status') renderView(false);} });
  }
  window.grHealthCheck=function(){ var b=document.getElementById('hcheckbtn'); if(b){b.disabled=true;b.textContent='Checking…';} D.health=undefined; ensureHealth(true); };
  window.startHealthPip=function(){ if(window._hpip) return; var poll=function(){ fetch('/api/health',{headers:{'x-admin-key':key()}}).then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ D.health=d; updatePip(d.overall); if(ROUTE==='status') renderView(false); } }).catch(function(){}); }; poll(); window._hpip=setInterval(poll,45000); };
  function hCard(s,up){
    var c=hStatusCol(s.status);
    var dot='<span class="hbdot '+s.status+'" style="--hb:'+hbDur(s.ms)+'s"></span>';
    var ms=(s.ms!=null&&s.status!=='unmonitored')?('<span style="font-variant-numeric:tabular-nums">'+s.ms+' ms</span>'):'';
    var u=up&&up[s.key]; var uchip=(u!=null)?('<span class="upchip" title="Reachable this share of the checks we have logged">'+u+'% uptime</span>'):'';
    var sep=(ms&&uchip)?' · ':'';
    return '<div class="scard '+s.status+'"><div class="scardtop">'+dot+'<span class="sname">'+esc(s.name)+'</span><span class="sstat" style="color:'+c+'">'+hStatusWord(s.status)+'</span></div>'
      +'<div class="sdetail">'+esc(s.detail||'')+'</div>'+((ms||uchip)?('<div class="smeta">'+ms+sep+uchip+'</div>'):'')
      +(s.impact?('<div class="simpact">'+esc(s.impact)+'</div>'):'')+'</div>';
  }
  function viewStatus(){
    if(D.health===undefined) ensureHealth(false);
    var head='<h2 class="vt">System status</h2><div class="vsub">Live health of everything your business runs on. Every green light is a real check, run just now — never a decoration.</div>';
    var d=D.health;
    if(!d) return head+'<div class="card" style="color:var(--muted)">Running live checks…</div>';
    if(!d.ok) return head+'<div class="card" style="color:var(--orange-deep)">Couldn\'t run the health check just now. <button class="btn" style="margin-left:8px" onclick="grHealthCheck()">Try again</button></div>';
    var sys=d.systems||[], up=d.uptime||{}, overall=d.overall||'up';
    var mon=sys.filter(function(s){return s.status!=='unmonitored';});
    var nDown=mon.filter(function(s){return s.status==='down';}).length, nSlow=mon.filter(function(s){return s.status==='slow';}).length;
    var hl=overall==='up'?'All systems operational':overall==='slow'?(nSlow+' system'+(nSlow>1?'s':'')+' running slow'):(nDown+' system'+(nDown>1?'s':'')+' down');
    var hero='<div class="shero '+overall+'"><span class="hbdot '+overall+'" style="--hb:'+hbDur(300)+'s;width:17px;height:17px"></span>'
      +'<div style="flex:1 1 auto;min-width:0"><div style="font-family:var(--serif);font-weight:700;font-size:1.4rem;color:'+hStatusCol(overall)+'">'+hl+'</div>'
      +'<div style="color:var(--muted);font-size:.83rem">Checked '+esc(ago(d.at))+' · refreshes itself'+(d.samples?(' · '+d.samples+' checks logged'):'')+'</div></div>'
      +'<button id="hcheckbtn" class="btn" onclick="grHealthCheck()">Check now</button></div>';
    function grp(t,sub,g){ var it=sys.filter(function(s){return s.group===g;}); if(!it.length)return''; return '<div class="secttl">'+t+'</div>'+(sub?'<div style="color:var(--muted);font-size:.8rem;margin:-3px 0 8px">'+sub+'</div>':'')+'<div class="sgrid">'+it.map(function(s){return hCard(s,up);}).join('')+'</div>'; }
    return head+hero
      +grp('Is your business online?','The real visitor journeys, tested end to end.','online')
      +grp('Data &amp; intelligence','The systems your hub runs on.','spine')
      +grp('Shopfronts &amp; tools','Known, but not truthfully checkable yet — shown honestly rather than guessed green.','shopfront');
  }

  window.grAsk=function(q){
    q=(q==null?'':String(q)).trim(); if(!q||ASKING) return;
    var inp=document.getElementById('askin'); if(inp) inp.value='';
    ASKLOG.unshift({q:q,a:null}); ASKING=true;
    if(ROUTE!=='ask'){ location.hash='ask'; } else { renderView(false); }
    fetch('/api/hub-ask',{method:'POST',headers:{'content-type':'application/json','x-admin-key':key()},body:JSON.stringify({q:q})})
      .then(function(r){return r.json();}).then(function(d){ ASKLOG[0].a=(d&&d.answer)||'No answer.'; }).catch(function(){ ASKLOG[0].a='Sorry, I couldn\'t reach the assistant just now.'; })
      .then(function(){ ASKING=false; if(ROUTE==='ask') renderView(false); });
  };

  function renderShell(){
    computeRag();
    root.innerHTML='<div class="ovl" id="ovl" onclick="grToggleNav()"></div><div class="shell"><aside class="side" id="side"><div class="brand" onclick="grGo(\'home\')" style="cursor:pointer" title="Home"><span>G.<span class="k">R.</span> Hub</span><span id="healthpip" class="hpip" title="System status" onclick="event.stopPropagation();grGo(\'status\')"></span></div><div class="sidescroll">'+navHTML()+'</div>'+footHTML()+'</aside><div class="main">'
      +'<div class="askwrap"><button class="btn menu-b" onclick="grToggleNav()">☰</button><div class="gsearch"><span class="gsi">⌕</span><input id="gsin" placeholder="Search anything: address, name, email, phone…" autocomplete="off" oninput="grSearchInput(this.value)" onkeydown="grSearchKey(event)" onblur="grSearchBlur()"><div class="gsdrop" id="gsdrop"></div></div><div class="ask"><span class="sp">✦</span><input id="askin" placeholder="Ask Georgina…" onkeydown="if(event.key===\'Enter\')grAsk(this.value)"><button onclick="grAsk(document.getElementById(\'askin\').value)">Ask</button></div></div>'
      +'<div class="view" id="view">'+viewFor(ROUTE)+'</div></div></div>';
    updateActive();
    if(ROUTE==='feed') startFeed(); else stopFeed();
    try{ if(D.health&&D.health.ok) updatePip(D.health.overall); if(window.startHealthPip) window.startHealthPip(); }catch(e){}
  }

  function boot(){
    if(!key()){ gate(); return; }
    root.innerHTML='<div class="gate"><h1>G.R. Estates Hub</h1><p>Loading your command centre…</p></div>';
    var hk={'x-admin-key':key()};
    Promise.all([
      fetch('/api/leads',{headers:hk}).then(function(r){ if(r.status===403) throw 'auth'; return r.json(); }),
      fetch('/api/hub',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/reviews').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/social').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/team').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/branches',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;})
    ]).then(function(res){
      var d=res[0]||{}; D.leads=(d&&d.leads)||[]; D.stats=(d&&d.stats)||{};
      D.portfolio=(res[1]&&res[1].portfolio)||null; D.listingsAt=(res[1]&&res[1].listings_at)||null; D.pipeline=(res[1]&&res[1].pipeline)||null; D.reviews=res[2]||null; D.socialOk=!!(res[3]&&res[3].posts&&res[3].posts.length);
      D.team=(res[4]&&res[4].members)||null; D.branches=(res[5]&&res[5].branches)||null;
      var id=(location.hash||'').replace(/^#/,''); var propDeep=(id.indexOf('property=')===0); var contactDeep=(id.indexOf('contact=')===0); var vwDeep=(id.indexOf('viewing=')===0);
      if(propDeep){ PROP_ID=decodeURIComponent(id.slice(9)); ROUTE='property'; }
      else if(contactDeep){ CONTACT_ID=decodeURIComponent(id.slice(8)); ROUTE='contact'; }
      else if(vwDeep){ VW_ID=decodeURIComponent(id.slice(8)); ROUTE='viewingdetail'; }
      else if(id.indexOf('sale=')===0){ SALE_ID=decodeURIComponent(id.slice(5)); ROUTE='saledetail'; }
      else if(id&&(findItem(id)||id==='profile')&&roleAllows(id)) ROUTE=id;
      renderShell();
      if(propDeep) loadProperty(PROP_ID);
      if(contactDeep) loadContact(CONTACT_ID);
      if(vwDeep) loadVw(VW_ID);
      if(ROUTE==='saledetail') loadSale(SALE_ID);
      fetch('/api/enquiries',{headers:hk}).then(function(r){return r.json();}).then(function(d){ D.enquiries=(d&&d.enquiries)||[]; if(d&&d.byKind)D.enqByKind=d.byKind; D.enqTotal=(d&&d.total!=null)?d.total:null; D.enqSyncedAt=(d&&d.synced_at)||null; if(ROUTE==='enquiries'||ROUTE==='feed') renderView(false); }).catch(function(){ D.enquiries=[]; if(ROUTE==='enquiries'||ROUTE==='feed') renderView(false); });
      fetch('/api/sync-status',{headers:hk}).then(function(r){return r.json();}).then(function(d){ D.sync=(d&&d.datasets)||null; if(ROUTE==='connections') renderView(false); }).catch(function(){});
    }).catch(function(e){
      if(e==='auth'){ try{ localStorage.removeItem('grAdminKey'); }catch(_){} gate('That key didn\'t work, try again.'); }
      else { gate('Couldn\'t load the hub, try again.'); }
    });
  }
  window.addEventListener('hashchange', function(){ if(document.getElementById('view')) onHash(); });
  setInterval(tickSync, 1000);
  boot();
})();
</script>
