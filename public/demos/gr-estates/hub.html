  }
  function viewChangelog(){
    var rows=CHANGELOG.map(function(r){ return '<div class="card" style="margin-bottom:11px"><div style="display:flex;align-items:baseline;gap:9px;margin-bottom:7px"><span style="font-family:var(--serif);font-weight:700;font-size:1.05rem">v'+esc(r.v)+'</span><span style="color:var(--muted);font-size:.82rem">'+esc(r.d)+'</span></div>'+r.items.map(function(i){ return '<div class="row"><span class="ic" style="color:var(--g)">✓</span>'+esc(i)+'</div>'; }).join('')+'</div>'; }).join('');
    return '<h2 class="vt">What\'s new</h2><div class="vsub">Hub v'+HUB_VERSION+' · built '+BUILD+'. Every release, newest first.</div>'+rows;
  }

  function viewProfile(){
    var who=WHO[ROLE]||['Georgina','Owner']; var ini=who[0].split(/\s+/).map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase();
    var allowed=ROLES[ROLE].nav; var mods=[];
    NAV.forEach(function(g){ g.items.forEach(function(it){ if(allowed==='all'||allowed.indexOf(it.id)>=0) mods.push(it.l); }); });
    var chips='<div class="chips">'+mods.map(function(m){ return '<span class="chip" style="cursor:default">'+esc(m)+'</span>'; }).join('')+'</div>';
    var assumeOpts=[['manager','a manager'],['negotiator','a negotiator'],['marketing','Tia (marketing)'],['accounts','Rosie (accounts)']];
    var aBtns=assumeOpts.map(function(o){ return '<button class="chip'+(ROLE===o[0]?' on':'')+'" onclick="grRole(\''+o[0]+'\')">Assume '+esc(o[1])+'</button>'; }).join('');
    var aExit=(ROLE!=='owner')?'<button class="btn btn-p" style="margin-top:12px" onclick="grRole(\'owner\')">Back to my own view</button>':'';
    var assume='<div class="secttl">Assume a colleague\'s view</div><div class="card"><div style="color:var(--muted);font-size:.86rem;margin-bottom:11px">See the Hub exactly as a colleague would, a preview for building and testing, not a real login. '+(ROLE!=='owner'?('You\'re currently assuming <b>'+esc((WHO[ROLE]||['',''])[1])+'</b>.'):'')+'</div><div class="chips">'+aBtns+'</div>'+aExit+'</div>';
    return '<h2 class="vt">Your profile</h2><div class="vsub">Who you are in the Hub, and what you can see.</div>'
      +'<div class="card" style="display:flex;align-items:center;gap:14px"><span class="av" style="width:48px;height:48px;font-size:1rem">'+esc(ini)+'</span><div><div style="font-family:var(--serif);font-weight:700;font-size:1.2rem">'+esc(who[0])+'</div><div style="color:var(--muted)">'+esc(who[1])+(allowed==='all'?' · full access':'')+'</div></div></div>'
      +assume
      +'<div class="secttl">What this role can access</div>'+chips
      +'<div class="card" style="margin-top:16px;color:var(--muted);font-size:.86rem">Truthfully: you\'re signed in on the shared admin key that you and Georgina use to build this out, so this is a role preview, not a personal account yet. Individual logins, each person with their own secure sign-in and exactly their role\'s access, are on the roadmap. Use "View as" at the top to preview any role.</div>'
      +'<button class="btn" style="margin-top:16px" onclick="grLogout()">Sign out</button>';
  }
  function viewFor(id){
    var body;
    if(id==='profile')body=viewProfile();
    else if(id==='home')body=roleHome();
    else if(id==='connections')body=viewConnections();
    else if(id==='ask')body=viewAsk();
    else if(id==='enquiries')body=viewEnquiries();
    else if(id==='listings')body=viewListings();
    else if(id==='reviews')body=viewReviews();
    else if(id==='roadmap')body=viewRoadmap();
    else if(id==='staff')body=viewStaff();
    else if(id==='feed')body=viewFeed();
    else if(id==='changelog')body=viewChangelog();
    else if(id==='viewings')body=viewViewings();
    else if(id==='valuations')body=viewValuations();
    else if(id==='contacts')body=viewContacts();
    else if(id==='property')return viewProperty();
    else body=viewSoon(id);
    return body+srcLine(id);
  }

  window.grAsk=function(q){
    q=(q==null?'':String(q)).trim(); if(!q||ASKING) return;
    var inp=document.getElementById('askin'); if(inp) inp.value='';
    ASKLOG.unshift({q:q,a:null}); ASKING=true;
    if(ROUTE!=='ask'){ location.hash='ask'; } else { renderView(false); }
    fetch('/api/hub-ask',{method:'POST',headers:{'content-type':'application/json','x-admin-key':key()},body:JSON.stringify({q:q})})
      .then(function(r){return r.json();}).then(function(d){ ASKLOG[0].a=(d&&d.answer)||'No answer.'; }).catch(function(){ ASKLOG[0].a='Sorry, I couldn\'t reach the assistant just now.'; })
      .then(function(){ ASKING=false; if(ROUTE==='ask') renderView(false); });
  };

  function renderShell(){
    computeRag();
    root.innerHTML='<div class="ovl" id="ovl" onclick="grToggleNav()"></div><div class="shell"><aside class="side" id="side"><div class="brand" onclick="grGo(\'home\')" style="cursor:pointer" title="Home"><span>G.<span class="k">R.</span> Hub</span></div><div class="sidescroll">'+navHTML()+'</div>'+footHTML()+'</aside><div class="main">'
      +'<div class="askwrap"><button class="btn menu-b" onclick="grToggleNav()">☰</button><div class="gsearch"><span class="gsi">⌕</span><input id="gsin" placeholder="Search anything: address, name, email, phone…" autocomplete="off" oninput="grSearchInput(this.value)" onkeydown="grSearchKey(event)" onblur="grSearchBlur()"><div class="gsdrop" id="gsdrop"></div></div><div class="ask"><span class="sp">✦</span><input id="askin" placeholder="Ask Georgina…" onkeydown="if(event.key===\'Enter\')grAsk(this.value)"><button onclick="grAsk(document.getElementById(\'askin\').value)">Ask</button></div></div>'
      +'<div class="view" id="view">'+viewFor(ROUTE)+'</div></div></div>';
    updateActive();
    if(ROUTE==='feed') startFeed(); else stopFeed();
  }

  function boot(){
    if(!key()){ gate(); return; }
    root.innerHTML='<div class="gate"><h1>G.R. Estates Hub</h1><p>Loading your command centre…</p></div>';
    var hk={'x-admin-key':key()};
    Promise.all([
      fetch('/api/leads',{headers:hk}).then(function(r){ if(r.status===403) throw 'auth'; return r.json(); }),
      fetch('/api/hub',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/reviews').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/social').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/team').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/branches',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;})
    ]).then(function(res){
      var d=res[0]||{}; D.leads=(d&&d.leads)||[]; D.stats=(d&&d.stats)||{};
      D.portfolio=(res[1]&&res[1].portfolio)||null; D.listingsAt=(res[1]&&res[1].listings_at)||null; D.pipeline=(res[1]&&res[1].pipeline)||null; D.reviews=res[2]||null; D.socialOk=!!(res[3]&&res[3].posts&&res[3].posts.length);
      D.team=(res[4]&&res[4].members)||null; D.branches=(res[5]&&res[5].branches)||null;
      var id=(location.hash||'').replace(/^#/,''); var propDeep=(id.indexOf('property=')===0);
      if(propDeep){ PROP_ID=decodeURIComponent(id.slice(9)); ROUTE='property'; }
      else if(id&&(findItem(id)||id==='profile')&&roleAllows(id)) ROUTE=id;
      renderShell();
      if(propDeep) loadProperty(PROP_ID);
      fetch('/api/enquiries',{headers:hk}).then(function(r){return r.json();}).then(function(d){ D.enquiries=(d&&d.enquiries)||[]; D.enqTotal=(d&&d.total!=null)?d.total:null; D.enqSyncedAt=(d&&d.synced_at)||null; if(ROUTE==='enquiries'||ROUTE==='feed') renderView(false); }).catch(function(){ D.enquiries=[]; if(ROUTE==='enquiries'||ROUTE==='feed') renderView(false); });
      fetch('/api/sync-status',{headers:hk}).then(function(r){return r.json();}).then(function(d){ D.sync=(d&&d.datasets)||null; if(ROUTE==='connections') renderView(false); }).catch(function(){});
    }).catch(function(e){
      if(e==='auth'){ try{ localStorage.removeItem('grAdminKey'); }catch(_){} gate('That key didn\'t work, try again.'); }
      else { gate('Couldn\'t load the hub, try again.'); }
    });
  }
  window.addEventListener('hashchange', function(){ if(document.getElementById('view')) onHash(); });
  boot();
})();
</script>
</body>
</html>
