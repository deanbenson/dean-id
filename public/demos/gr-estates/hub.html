<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Hub ┬Ę G.R. Estates</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
 :root{--ink:#2c2e33;--orange:#e2672a;--orange-deep:#c2541d;--cream:#edeae6;--paper:#fff;--line:#e1dace;--muted:#76726b;--panel:#e7e1d8;--sans:'Inter',-apple-system,sans-serif;--serif:'Quicksand',sans-serif;--g:#1d9e75;--a:#e0992a;--r:#d2492b}
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased}
 a{color:inherit;text-decoration:none}
 .gate{max-width:380px;margin:90px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center}
 .gate h1{font-family:var(--serif);font-size:1.3rem;margin-bottom:6px}.gate p{color:var(--muted);font-size:.9rem;margin-bottom:16px}
 .gate input{width:100%;border:1px solid var(--line);border-radius:10px;padding:.7rem .8rem;font:inherit;margin-bottom:12px}
 .btn{font:inherit;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:.5rem .9rem;cursor:pointer}
 .btn-p{background:var(--orange);color:#fff;border-color:var(--orange)}.btn-p:hover{background:var(--orange-deep)}
 .shell{display:grid;grid-template-columns:214px 1fr;min-height:100vh}
 .side{background:var(--panel);border-right:1px solid #ddd5c8;padding:14px 11px;position:sticky;top:0;height:100vh;overflow:auto}
 .brand{display:flex;align-items:center;gap:8px;font-family:var(--serif);font-weight:700;font-size:1.08rem;padding:4px 8px 10px}.brand .k{color:var(--orange)}
 .gl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:13px 8px 4px}
 .nv{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px;font-size:.86rem;color:#52555c;cursor:pointer}
 .nv:hover{background:rgba(255,255,255,.5)}
 .nv.on{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 4px rgba(44,46,51,.07)}
 .nv .ic{width:17px;text-align:center;flex:none;opacity:.8}
 .dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex:none}
 .main{min-width:0;display:flex;flex-direction:column}
 .askwrap{position:sticky;top:0;background:rgba(237,234,230,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:11px 22px;z-index:5;display:flex;align-items:center;gap:9px}
 .menu-b{display:none}
 .ask{flex:1;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:.5rem .8rem;max-width:600px}
 .ask input{flex:1;border:0;outline:0;font:inherit;background:none;color:var(--ink)}
 .ask .sp{color:var(--orange)}
 .ask button{border:0;background:var(--orange);color:#fff;font:inherit;font-weight:600;font-size:.82rem;border-radius:8px;padding:.35rem .8rem;cursor:pointer}
 .rolesel{font:inherit;font-size:.78rem;border:1px solid var(--line);background:#fff;border-radius:9px;padding:.42rem .5rem;color:var(--ink);max-width:130px}
 .vlab{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
 .acct{display:flex;align-items:center;gap:8px}
 .av{width:30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.72rem;font-family:var(--serif);flex:none}
 .who{display:flex;flex-direction:column;line-height:1.15}.who b{font-size:.82rem;font-weight:600}.who span{font-size:.68rem;color:var(--muted)}
 @media(max-width:680px){.who{display:none}.vlab{display:none}}
 .view{padding:20px 22px 64px;max-width:1080px}
 h2.vt{font-family:var(--serif);font-weight:700;font-size:1.5rem;letter-spacing:-.01em}
 .vsub{color:var(--muted);font-size:.9rem;margin-top:2px;margin-bottom:18px}
 .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:13px;margin-bottom:8px}
 .tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .tile.acc{background:linear-gradient(155deg,#fff,#fbf1e9)}
 .tile .n{font-family:var(--serif);font-weight:700;font-size:1.65rem;line-height:1.05}
 .tile .n .st{color:var(--g);font-size:.9rem;font-weight:600}
 .tile .l{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
 .secttl{font-family:var(--serif);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:26px 0 11px}
 .cols{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:14px}
 .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 17px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .card h3{font-family:var(--serif);font-size:1.02rem;margin-bottom:8px}
 .row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--line);font-size:.86rem}.row:first-of-type{border-top:0}
 .row .ic{width:16px;flex:none;opacity:.7;margin-top:1px}.row .tm{margin-left:auto;color:var(--muted);font-size:.78rem;white-space:nowrap}
 .kind{font-size:.7rem;font-weight:700;padding:.1rem .45rem;border-radius:6px;background:rgba(226,103,42,.12);color:var(--orange-deep);text-transform:capitalize}
 table.enq{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:.86rem;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 table.enq th,table.enq td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
 table.enq th{background:#faf7f2;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
 table.enq tr:last-child td{border-bottom:0}
 .ok{color:#1d9e75;font-weight:700;white-space:nowrap}.no{color:var(--orange-deep);font-weight:700;white-space:nowrap}
 .efilt{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
 .sysg{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
 .sys{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .sys .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
 .sys .nm{font-weight:600;font-size:.92rem}
 .rag{font-size:.68rem;font-weight:700;padding:.12rem .45rem;border-radius:20px}
 .rag.g{background:rgba(29,158,117,.14);color:#157a59}.rag.a{background:rgba(224,153,42,.16);color:#9a6612}.rag.r{background:rgba(210,73,43,.14);color:var(--orange-deep)}.rag.n{background:rgba(118,114,107,.14);color:#5f5b53}
 .sys .dta{font-size:.8rem;color:#54585f;margin-top:7px}.sys .fr{font-size:.72rem;color:var(--muted);margin-top:3px}
 .road{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
 .rcol{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 15px}
 .rcol h4{font-family:var(--serif);font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px;font-weight:700}
 .rdot{width:8px;height:8px;border-radius:50%;flex:none}.ritem{font-size:.84rem;padding:7px 0;border-top:1px solid var(--line);color:#43464d}.ritem:first-of-type{border-top:0}
 .brow{display:grid;grid-template-columns:84px 1fr 30px;align-items:center;gap:9px;font-size:.84rem;margin:8px 0}
 .bar{height:9px;background:#efe7dd;border-radius:5px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-deep))}
 .branch{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line)}.branch:first-of-type{border-top:0}
 .branch .sc{font-family:var(--serif);font-weight:700}.branch .sc b{color:var(--orange)}
 .chips{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 2px}
 .chip{font-size:.78rem;color:#54585f;background:#faf7f2;border:1px solid var(--line);border-radius:20px;padding:.3rem .7rem;cursor:pointer}.chip:hover{border-color:var(--orange)}.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
 .qa{margin:14px 0}.qq{font-weight:600;margin-bottom:5px}.aa{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;white-space:pre-wrap;font-size:.92rem;line-height:1.6}
 .soon{background:#fff;border:1px dashed var(--line);border-radius:16px;padding:46px 30px;text-align:center;color:var(--muted)}
 .soon .bg{font-family:var(--serif);font-size:1.3rem;color:var(--ink);margin:6px 0}
 .soon .tag{display:inline-block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--orange-deep);background:rgba(226,103,42,.1);padding:.2rem .6rem;border-radius:20px;margin-top:10px}
 .ovl{display:none}
 @media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:240px;transform:translateX(-100%);transition:.22s;z-index:40}
  .side.open{transform:none}
  .menu-b{display:inline-flex}
  .cols{grid-template-columns:1fr}.road{grid-template-columns:1fr 1fr}.rolesel{max-width:120px}
  .ovl.show{display:block;position:fixed;inset:0;background:rgba(20,20,20,.35);z-index:35}
 }
 @media(max-width:480px){.road{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  var root=document.getElementById('root');
  var ROUTE='home', D={}, NAVOPEN=false, ASKLOG=[], ASKING=false, ENQFILTER='all', ROLE='owner';
  function key(){ try{ return localStorage.getItem('grAdminKey')||''; }catch(e){ return ''; } }
  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function money(n){ if(n==null||isNaN(n)) return 'ŌĆö'; return '┬Ż'+Math.round(n).toLocaleString('en-GB'); }
  function ago(ts){ if(!ts) return ''; var s=Math.floor((Date.now()-ts)/1000); if(s<60)return 'just now'; var m=Math.floor(s/60); if(m<60)return m+' min ago'; var h=Math.floor(m/60); if(h<24)return h+' hr ago'; var d=Math.floor(h/24); return d+' day'+(d>1?'s':'')+' ago'; }
  function fmt(ts){ if(!ts)return ''; var d=new Date(ts); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

  window.grLogout=function(){ try{ localStorage.removeItem('grAdminKey'); }catch(e){} boot(); };
  window.grSave=function(){ var el=document.getElementById('k'); var v=el?el.value:''; try{ localStorage.setItem('grAdminKey',(v||'').trim()); }catch(e){} boot(); };
  function gate(err){
    root.innerHTML='<div class="gate"><h1>G.R. Estates Hub</h1><p>Your command centre. Enter the admin key to continue.</p><input id="k" type="password" placeholder="Admin key" autocomplete="off">'+(err?'<p style="color:#c2541d">'+esc(err)+'</p>':'')+'<button class="btn btn-p" style="width:100%" onclick="grSave()">Open hub</button></div>';
    var i=document.getElementById('k'); if(i){ i.focus(); i.addEventListener('keydown',function(e){ if(e.key==="Enter") grSave(); }); }
  }

  var NAV=[
    {g:'Overview',items:[{id:'home',l:'Home',ic:'Ōīé',rag:'g'},{id:'connections',l:'Connections',ic:'ŌÜ»',rag:'a'},{id:'ask',l:'Ask Georgina',ic:'Ō£”',rag:'g'}]},
    {g:'Pipeline',items:[{id:'enquiries',l:'Enquiries',ic:'Ō£ē',rag:'g'},{id:'valuations',l:'Valuations',ic:'┬Ż',rag:'g'},{id:'viewings',l:'Viewings',ic:'ŌŚĘ',rag:'g'},{id:'progression',l:'Progression',ic:'ŌåŚ',rag:'g'}]},
    {g:'People',items:[{id:'contacts',l:'Contacts',ic:'Ōś░',rag:'g'},{id:'calendar',l:'Calendar',ic:'Ō¢”',rag:'g'}]},
    {g:'Property',items:[{id:'listings',l:'Listings',ic:'Ōīé',rag:'g'},{id:'marketing',l:'Marketing',ic:'ŌŚł',rag:'a'}]},
    {g:'Lettings',items:[{id:'tenancies',l:'Tenancies',ic:'ŌÜ┐',rag:'g'},{id:'maintenance',l:'Maintenance',ic:'Ō£Ė',rag:'a'}]},
    {g:'Services',items:[{id:'removals',l:'Removals',ic:'ŌŖ¤',rag:'g'},{id:'mortgages',l:'Mortgages',ic:'%',rag:'n'}]},
    {g:'Money',items:[{id:'accounts',l:'Accounts',ic:'$',rag:'g'},{id:'compliance',l:'Compliance',ic:'Ō£ō',rag:'a'}]},
    {g:'Insight',items:[{id:'analytics',l:'Analytics',ic:'Ō¢ż',rag:'g'},{id:'reviews',l:'Reviews',ic:'Ōśģ',rag:'g'}]},
    {g:'Team',items:[{id:'staff',l:'Staff',ic:'Ōś║',rag:'g'},{id:'feed',l:'Company feed',ic:'ŌØÅ',rag:'g'},{id:'roadmap',l:'Roadmap',ic:'Ō×ö',rag:'g'}]},
    {g:'',items:[{id:'settings',l:'Settings',ic:'ŌÜÖ',rag:'g'}]}
  ];
  var SOON={
    valuations:'Booked valuations, the diary and outcomes, from Street.',viewings:'Every viewing, with feedback collected automatically.',
    progression:'Sales from offer to completion, with chain status.',contacts:'Buyers, sellers, landlords and tenants in one place.',
    calendar:'Appointments, viewings, valuations and key dates.',marketing:'Rightmove, OnTheMarket and social performance, plus what needs a post.',
    tenancies:'Live tenancies, renewals and rent.',maintenance:'Works orders and contractor jobs.',
    removals:'G.R. Removals jobs, bookings and its 5.0-star reviews.',mortgages:'Mortgage referrals and outcomes.',
    accounts:'Client money, landlord statements and invoices.',compliance:'Gas, EICR and EPC tracking, plus AML checks.',
    analytics:'Trends, comparisons and snapshot views you can pin.',staff:'The team, roles and performance.',
    feed:'Live company wins, everyone sees their own feed.',settings:'People and access, plus integrations.'
  };
  var PLAN=[
    {t:'New website + live listings',s:'live'},{t:'Leads into Street',s:'live'},{t:'Live Google reviews',s:'live'},{t:'Ask Georgina (AI)',s:'live'},
    {t:'Saved + recently viewed',s:'live'},{t:'Instant valuation funnel',s:'live'},{t:'Be-first property alerts',s:'live'},{t:'The Hub app',s:'live'},
    {t:'Ask Georgina inside the Hub',s:'now'},{t:'Connections / healthcheck',s:'now'},{t:'Shareable URLs + role views',s:'now'},
    {t:'Branch routing for leads',s:'next'},{t:'Role dashboards',s:'next'},{t:'Company feed',s:'next'},
    {t:'AI front desk (phone)',s:'later'},{t:'Per-user logins + roles',s:'later'},{t:'Make it G.R.-owned + go live',s:'later'}
  ];
  var ROLES={
    owner:{label:'Owner',nav:'all',home:'owner'},
    manager:{label:'Manager',nav:['home','connections','ask','enquiries','valuations','viewings','progression','contacts','calendar','listings','marketing','tenancies','maintenance','removals','accounts','compliance','analytics','reviews','staff','feed','roadmap'],home:'owner'},
    negotiator:{label:'Negotiator',nav:['home','ask','enquiries','viewings','contacts','calendar','listings','reviews','feed','roadmap'],home:'nego'},
    marketing:{label:'Marketing',nav:['home','ask','marketing','listings','reviews','analytics','feed','roadmap'],home:'marketing'},
    accounts:{label:'Accounts',nav:['home','ask','accounts','compliance','reviews','feed','roadmap'],home:'accounts'}
  };
  var WHO={owner:['Georgina','Owner'],manager:['Branch manager','Manager'],negotiator:['Negotiator','Sales / lettings'],marketing:['Tia','Marketing'],accounts:['Rosie','Accounts']};

  function ragColor(c){ return c==='g'?'var(--g)':c==='a'?'var(--a)':c==='r'?'var(--r)':'var(--muted)'; }
  function findItem(id){ for(var i=0;i<NAV.length;i++)for(var j=0;j<NAV[i].items.length;j++) if(NAV[i].items[j].id===id) return NAV[i].items[j]; return null; }
  function roleAllows(id){ if(id==='profile') return true; var n=ROLES[ROLE].nav; return n==='all'||n.indexOf(id)>=0; }
  function computeRag(){
    for(var i=0;i<NAV.length;i++)for(var j=0;j<NAV[i].items.length;j++){ var it=NAV[i].items[j];
      if(it.id==='connections') it.rag=(D.socialOk?'g':'a');
      if(it.id==='marketing') it.rag=(D.socialOk?'g':'r');
      if(it.id==='enquiries'){ var L=D.leads||[]; var pct=L.length?Math.round(L.filter(function(x){return x.streetOk;}).length/L.length*100):100; it.rag=pct>=100?'g':'a'; }
    }
  }

  window.grGo=function(id){ if(!roleAllows(id)) id='home'; if(('#'+id)===location.hash){ onHash(); } else { location.hash=id; } };
  window.grToggleNav=function(){ NAVOPEN=!NAVOPEN; var s=document.getElementById('side'); var o=document.getElementById('ovl'); if(s)s.classList.toggle('open',NAVOPEN); if(o)o.classList.toggle('show',NAVOPEN); };
  window.grRole=function(v){ if(!ROLES[v]) return; ROLE=v; if(!roleAllows(ROUTE)) ROUTE='home'; ENQFILTER='all'; renderShell(); if(('#'+ROUTE)!==location.hash){ location.hash=ROUTE; } };
  window.grEnqFilter=function(f){ ENQFILTER=f; renderView(false); };

  function onHash(){
    var id=(location.hash||'').replace(/^#/,'')||'home';
    if(id!=='profile' && !findItem(id)) id='home';
    if(!roleAllows(id)) id='home';
    ROUTE=id; NAVOPEN=false;
    var s=document.getElementById('side'); if(s)s.classList.remove('open');
    var o=document.getElementById('ovl'); if(o)o.classList.remove('show');
    updateActive(); renderView(true);
  }
  function updateActive(){ var ns=document.querySelectorAll('.nv'); for(var i=0;i<ns.length;i++){ ns[i].classList.toggle('on', ns[i].getAttribute('data-id')===ROUTE); } }
  function renderView(scrollTop){ var v=document.getElementById('view'); if(!v) return; v.innerHTML=viewFor(ROUTE); if(scrollTop){ try{ window.scrollTo(0,0); }catch(e){} } }

  function navHTML(){
    var h='<div class="brand"><span>G.<span class="k">R.</span> Hub</span></div>';
    NAV.forEach(function(grp){
      var vis=grp.items.filter(function(it){ return roleAllows(it.id); });
      if(!vis.length) return;
      if(grp.g) h+='<div class="gl">'+grp.g+'</div>';
      vis.forEach(function(it){ h+='<div class="nv'+(it.id===ROUTE?' on':'')+'" data-id="'+it.id+'" onclick="grGo(\''+it.id+'\')"><span class="ic">'+it.ic+'</span>'+esc(it.l)+'<span class="dot" style="background:'+ragColor(it.rag)+'"></span></div>'; });
    });
    return h;
  }

  function tile(n,l,acc,sub){ return '<div class="tile'+(acc?' acc':'')+'"><div class="n">'+n+(sub?' <span class="st">'+sub+'</span>':'')+'</div><div class="l">'+l+'</div></div>'; }

  function viewHome(){
    var leads=D.leads||[]; var w0=Date.now()-6048e5; var nW=0; leads.forEach(function(L){ if((L.at||0)>=w0)nW++; });
    var pf=D.portfolio, rv=D.reviews, st=D.stats||{};
    var staff=(D.team&&D.team.length)||null;
    var branches=(D.branches&&D.branches.length)?D.branches:null;
    var branchN=branches?branches.length:((rv&&rv.branches)?rv.branches.length:null);
    var tiles=tile(pf?pf.total:'ŌĆö','Properties live',true)+tile(pf?pf.sale:'ŌĆö','For sale')+tile(pf?pf['let']:'ŌĆö','To let')+tile(branchN!=null?branchN:'ŌĆö','Branches')+tile(staff!=null?staff:'ŌĆö','Team')+tile(rv&&rv.average?rv.average.toFixed(1)+'Ōśģ':'ŌĆö','Reviews');
    var revByName={}; (rv&&rv.branches||[]).forEach(function(b){ revByName[(b.name||'').toLowerCase()]=b; });
    var branchRows;
    if(branches){ branchRows=branches.map(function(b){ var rb=revByName[(b.name||'').toLowerCase()]; var sc=rb?('<b>'+rb.rating+'Ōśģ</b> ┬Ę '+rb.count+' reviews'):'<span style="color:var(--muted)">reviews syncing</span>'; return '<div class="branch"><span>'+esc(b.name)+(b.town?' <span style="color:var(--muted);font-size:.8rem">'+esc(b.town)+'</span>':'')+'</span><span class="sc">'+sc+'</span></div>'; }).join(''); }
    else if(rv&&rv.branches&&rv.branches.length){ branchRows=rv.branches.map(function(b){ return '<div class="branch"><span>'+esc(b.name)+'</span><span class="sc"><b>'+b.rating+'Ōśģ</b> ┬Ę '+b.count+' reviews</span></div>'; }).join(''); }
    else { branchRows='<div class="row" style="color:var(--muted)">Branches syncing from StreetŌĆ”</div>'; }
    function svcChip(lab,val,on){ return '<span class="chip" style="cursor:default'+(on?'':';opacity:.55')+'">'+lab+(on?(' ┬Ę '+val):' ┬Ę connect')+'</span>'; }
    var svc='<div class="chips">'+svcChip('Sales',(pf?pf.sale+' live':''),!!pf)+svcChip('Lettings',(pf?pf['let']+' live':''),!!pf)+svcChip('Property management','',false)+svcChip('Removals','',false)+svcChip('Mortgages','',false)+'</div>';
    var max=0;(pf&&pf.byTown||[]).forEach(function(t){if(t.n>max)max=t.n;});
    var areas=(pf&&pf.byTown||[]).slice(0,6).map(function(t){ return '<div class="brow"><span>'+esc(t.town)+'</span><span class="bar"><i style="width:'+(max?Math.round(t.n/max*100):0)+'%"></i></span><span style="text-align:right;font-weight:600">'+t.n+'</span></div>'; }).join('')||'<div class="row" style="color:var(--muted)">ŌĆö</div>';
    var chan='<div class="row"><span class="ic">Ō£ē</span><span>Website enquiries</span><span class="tm">'+leads.length+' total ┬Ę '+nW+' this week</span></div><div class="row"><span class="ic">Ōśģ</span><span>Be-first buyer alerts</span><span class="tm">'+(st.alerts!=null?st.alerts:0)+'</span></div><div class="row"><span class="ic">Ō£”</span><span>My G.R. Estates signups</span><span class="tm">'+(st.waitlist!=null?st.waitlist:0)+'</span></div>';
    var gaps='<div class="row" style="color:var(--muted)">Sales pipeline &amp; completions</div><div class="row" style="color:var(--muted)">Rent roll, arrears &amp; occupancy</div><div class="row" style="color:var(--muted)">Revenue &amp; fees</div><div class="row" style="color:var(--muted)">Phone &amp; portal enquiries</div><div style="font-size:.76rem;color:var(--muted);margin-top:8px">These light up as we wire Street\'s sales, lettings and finance feeds.</div>';
    return '<h2 class="vt">Good to see you ­¤æŗ</h2><div class="vsub">'+(new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}))+(branchN!=null?(' ┬Ę '+branchN+' branches'):'')+(staff!=null?(' ┬Ę '+staff+' staff'):'')+'</div>'
      +'<div class="tiles">'+tiles+'</div>'
      +'<div class="secttl">Service lines</div>'+svc
      +'<div class="cols" style="margin-top:18px"><div class="card"><h3>Branches</h3>'+branchRows+'</div><div class="card"><h3>Stock by area</h3>'+areas+'</div></div>'
      +'<div class="cols" style="margin-top:14px"><div class="card"><h3>Live channels</h3>'+chan+'</div><div class="card"><h3>Not connected yet</h3>'+gaps+'</div></div>';
  }

  function roleHome(){
    var h=ROLES[ROLE].home; if(h==='owner') return viewHome();
    var rv=D.reviews, pf=D.portfolio, leads=D.leads||[];
    if(h==='nego'){
      var work=leads.slice(0,6).map(function(L){ return '<div class="row"><span class="ic">Ō£ē</span><span><span class="kind">'+esc(L.kind||'enquiry')+'</span> '+esc(L.name||'New enquiry')+'</span><span class="tm">'+ago(L.at)+'</span></div>'; }).join('')||'<div class="row" style="color:var(--muted)">Nothing waiting.</div>';
      return '<h2 class="vt">Your day</h2><div class="vsub">Your worklist and what needs chasing. Per-person assignment arrives with logins.</div><div class="tiles">'+tile(leads.length,'Open enquiries',true)+tile('ŌĆö','Viewings today')+tile('ŌĆö','Your valuations')+'</div><div class="secttl">To action</div><div class="card"><h3>Recent enquiries</h3>'+work+'</div>';
    }
    if(h==='marketing'){
      var bran=(rv&&rv.branches||[]).map(function(b){ return '<div class="branch"><span>'+esc(b.name)+'</span><span class="sc"><b>'+(b.rating||'ŌĆö')+'Ōśģ</b> ┬Ę '+(b.count||0)+'</span></div>'; }).join('')||'<div class="row" style="color:var(--muted)">ŌĆö</div>';
      return '<h2 class="vt">Hi Tia</h2><div class="vsub">Your marketing dashboard. Portal and social stats fill in as we connect Meta and the portals, nothing here is invented.</div><div class="tiles">'+tile(rv&&rv.average?rv.average.toFixed(1)+'Ōśģ':'ŌĆö','Reviews',true)+tile(pf?pf.total:'ŌĆö','Live listings')+tile('ŌĆö','Portal views')+tile('ŌĆö','Posts this week')+'</div><div class="cols"><div class="card"><h3>Needs a post</h3><div class="row" style="color:var(--muted)">New instructions and price reductions will appear here to promote, once we wire Street\'s status feed.</div></div><div class="card"><h3>Reviews by branch</h3>'+bran+'</div></div>';
    }
    if(h==='accounts'){
      return '<h2 class="vt">Hi Rosie</h2><div class="vsub">Your finance dashboard. The money modules connect through Street.</div><div class="tiles">'+tile('ŌĆö','Rent due')+tile('ŌĆö','Arrears')+tile('ŌĆö','Landlord payouts')+tile('ŌĆö','Invoices')+'</div><div class="card" style="color:var(--muted)">Client accounts, statements and compliance plug in here, fed by Street. Coming soon.</div>';
    }
    return viewHome();
  }

  function viewEnquiries(){
    var leads=D.leads||[]; var byKind={valuation:0,viewing:0,contact:0,other:0}; leads.forEach(function(L){ var k=L.kind||'other'; byKind[k]=(byKind[k]||0)+1; });
    function chip(f,lab){ return '<span class="chip'+(ENQFILTER===f?' on':'')+'" onclick="grEnqFilter(\''+f+'\')">'+lab+'</span>'; }
    var chips='<div class="efilt">'+chip('all','All ('+leads.length+')')+chip('valuation','Valuations ('+(byKind.valuation||0)+')')+chip('viewing','Viewings ('+(byKind.viewing||0)+')')+chip('contact','Contact ('+(byKind.contact||0)+')')+'</div>';
    var shown=leads.filter(function(L){ return ENQFILTER==='all'||(L.kind||'contact')===ENQFILTER; });
    var body;
    if(!leads.length) body='<div class="card" style="color:var(--muted)">No enquiries yet. They\'ll appear here the moment someone uses a form on the site.</div>';
    else if(!shown.length) body='<div class="card" style="color:var(--muted)">No '+esc(ENQFILTER)+' enquiries yet.</div>';
    else { var rows=shown.map(function(L){ var c=[L.email,L.phone].filter(Boolean).map(esc).join('<br>'); var ins=L.streetOk?'<span class="ok">Ō£ō Street</span>':'<span class="no">backup</span>'; return '<tr><td>'+esc(fmt(L.at))+'</td><td><span class="kind">'+esc(L.kind||'enquiry')+'</span></td><td>'+esc(L.name||'ŌĆö')+'</td><td>'+(c||'ŌĆö')+'</td><td>'+esc((L.message||'').slice(0,180))+'</td><td>'+ins+'</td></tr>'; }).join('');
      body='<table class="enq"><thead><tr><th>When</th><th>Type</th><th>Name</th><th>Contact</th><th>Message</th><th>Street</th></tr></thead><tbody>'+rows+'</tbody></table>'; }
    return '<h2 class="vt">Enquiries</h2><div class="vsub">Every website lead, flowing into Street. Newest first.</div>'+chips+body;
  }

  function viewConnections(){
    var pf=D.portfolio, rv=D.reviews, st=D.stats||{}, leads=D.leads||[];
    function rel(ts){ return ts?('updated '+ago(ts)):'live'; }
    var wired=[
      {nm:'Street CRM',st:'Live',dta:(pf?pf.total:'ŌĆö')+' listings ┬Ę '+(D.team?D.team.length:'ŌĆö')+' staff'+(D.branches?(' ┬Ę '+D.branches.length+' offices'):''),fr:rel(D.listingsAt?new Date(D.listingsAt).getTime():0)},
      {nm:'Google reviews',st:'Live',dta:(rv?rv.total:'ŌĆö')+' reviews ┬Ę '+(rv&&rv.average?rv.average.toFixed(1):'ŌĆö')+' average',fr:rel(rv&&rv.generated_at?new Date(rv.generated_at).getTime():0)},
      {nm:'Website + leads',st:'Live',dta:leads.length+' enquiries captured',fr:(st.lastLeadAt?('last enquiry '+ago(st.lastLeadAt)):(leads.length?('last enquiry '+ago(leads[0].at)):'none yet'))},
      {nm:'Be-first alerts',st:'Live',dta:(st.alerts!=null?st.alerts:0)+' signups',fr:(st.lastAlertAt?('last '+ago(st.lastAlertAt)):'none yet')},
      {nm:'Ask Georgina (AI)',st:'Live',dta:'on the site and in this hub',fr:'answers on demand'},
      {nm:'My G.R. Estates',st:'Live',dta:(st.waitlist!=null?st.waitlist:0)+' early-access signups',fr:'live'}
    ];
    if(D.socialOk) wired.push({nm:'Social (Meta)',st:'Live',dta:'feed showing on the site',fr:'connected'});
    var known=[];
    if(!D.socialOk) known.push({nm:'Social (Meta + others)',rag:'r',st:'Not connected',dta:'Instagram, Facebook, LinkedIn, TikTok accounts',fr:'feed not pulled in yet'});
    known.push({nm:'Rightmove + OnTheMarket',rag:'n',st:'Not wired',dta:'listed on, per your own site',fr:'not connected to the hub'});
    known.push({nm:'Phone',rag:'n',st:'Not connected',dta:'01642 378022, no integration',fr:'planned, the basis for the AI front desk'});
    known.push({nm:'G.R. Removals',rag:'n',st:'Partial',dta:'Google reviews only',fr:'jobs and bookings not wired'});
    function card(s,liveFlag){ var rag=liveFlag?'g':(s.rag||'n'); return '<div class="sys"><div class="top"><span class="nm">'+esc(s.nm)+'</span><span class="rag '+rag+'">'+esc(s.st)+'</span></div><div class="dta">'+esc(s.dta)+'</div><div class="fr">'+esc(s.fr)+'</div></div>'; }
    return '<h2 class="vt">Connections</h2><div class="vsub">Every system, whether its data is flowing, and when it last came in. Only what\'s true, nothing assumed.</div>'
      +'<div class="secttl">Wired in ┬Ę live data</div><div class="sysg">'+wired.map(function(s){return card(s,true);}).join('')+'</div>'
      +'<div class="secttl">Known, not yet wired</div><div class="sysg">'+known.map(function(s){return card(s,false);}).join('')+'</div>'
      +'<div class="card" style="margin-top:14px;color:var(--muted);font-size:.84rem">Your full system list, accounts, compliance, maintenance, deposits and the rest, lives in your credentials tracker. Rather than guess at them, we\'ll pull the real inventory in here so each shows its true status and last sync.</div>';
  }

  function viewListings(){
    var p=D.portfolio; if(!p) return '<h2 class="vt">Listings</h2><div class="vsub">Live from your property database.</div><div class="card">LoadingŌĆ”</div>';
    var max=0;(p.byTown||[]).forEach(function(t){if(t.n>max)max=t.n;});
    var towns=(p.byTown||[]).slice(0,6).map(function(t){ return '<div class="brow"><span>'+esc(t.town)+'</span><span class="bar"><i style="width:'+(max?Math.round(t.n/max*100):0)+'%"></i></span><span style="text-align:right;font-weight:600">'+t.n+'</span></div>'; }).join('');
    var types=(p.byType||[]).slice(0,8).map(function(t){ return '<span class="chip" style="cursor:default">'+esc(t.type)+' ┬Ę '+t.n+'</span>'; }).join('');
    return '<h2 class="vt">Listings</h2><div class="vsub">Live from your property database.</div><div class="tiles">'+tile(p.total||0,'On the market',true)+tile(p.sale||0,'For sale')+tile(p.let||0,'To let')+tile(money(p.avgSale),'Avg asking')+tile(p.avgLetPcm!=null?money(p.avgLetPcm):'ŌĆö','Avg rent pcm')+'</div><div class="secttl">Where</div><div class="card">'+(towns||'No data')+'</div>'+(types?'<div class="secttl">By type</div><div class="chips">'+types+'</div>':'');
  }

  function viewReviews(){
    var r=D.reviews; if(!r) return '<h2 class="vt">Reviews</h2><div class="vsub">Live from Google.</div><div class="card">LoadingŌĆ”</div>';
    var rows=(r.branches||[]).map(function(b){ return '<div class="branch"><span>'+esc(b.name)+'</span><span class="sc"><b>'+(b.rating||'ŌĆö')+'Ōśģ</b> ┬Ę '+(b.count||0)+'</span></div>'; }).join('');
    if(r.removals) rows+='<div class="branch"><span>'+esc(r.removals.name||'G.R. Removals')+' <span style="color:var(--muted);font-size:.8rem">(sister co.)</span></span><span class="sc"><b>'+(r.removals.rating||'ŌĆö')+'Ōśģ</b> ┬Ę '+(r.removals.count||0)+'</span></div>';
    return '<h2 class="vt">Reviews</h2><div class="vsub">Live from Google ┬Ę '+(r.average||'ŌĆö')+'Ōśģ across '+(r.total||0)+' estate reviews.</div><div class="card"><h3>By branch</h3>'+rows+'</div>';
  }

  function viewRoadmap(){
    var groups=[['live','Live','#1d9e75'],['now','Building now','#e2672a'],['next','Next up','#3b82c4'],['later','Later','#9a958c']];
    var road='<div class="road">'+groups.map(function(g){ var items=PLAN.filter(function(r){return r.s===g[0];}); var li=items.map(function(r){return '<div class="ritem">'+esc(r.t)+'</div>';}).join('')||'<div class="ritem" style="color:#9a958c">ŌĆö</div>'; return '<div class="rcol"><h4><span class="rdot" style="background:'+g[2]+'"></span>'+g[1]+'</h4>'+li+'</div>'; }).join('')+'</div>';
    return '<h2 class="vt">Roadmap</h2><div class="vsub">What we\'re building, and what\'s coming. Everyone can see this.</div>'+road;
  }

  function viewAsk(){
    var log=ASKLOG.map(function(x){ return '<div class="qa"><div class="qq">'+esc(x.q)+'</div><div class="aa">'+(x.a===null?'<span style="color:var(--muted)">ThinkingŌĆ”</span>':esc(x.a))+'</div></div>'; }).join('');
    var chips='<div class="chips">'+['Anything need my attention?','How many enquiries this week?','Which area has the most listings?','How are our reviews doing?'].map(function(c){ return '<span class="chip" onclick="grAsk(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</span>'; }).join('')+'</div>';
    return '<h2 class="vt">Ask Georgina</h2><div class="vsub">Ask anything about the business in plain English. She answers from your live data.</div>'+chips+(log||'<div class="card" style="color:var(--muted)">Try a suggestion above, or use the ask bar at the top of any page.</div>');
  }

  function viewSoon(id){ var it=findItem(id); return '<h2 class="vt">'+esc(it?it.l:'Coming soon')+'</h2><div class="vsub">A module in the master plan.</div><div class="soon"><div style="font-size:1.6rem">­¤¦Ł</div><div class="bg">'+esc(it?it.l:'')+' is on the way</div><div>'+esc(SOON[id]||'Part of the Hub, coming soon.')+'</div><div class="tag">Planned</div></div>'; }

  function viewProfile(){
    var who=WHO[ROLE]||['Georgina','Owner']; var ini=who[0].split(/\s+/).map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase();
    var allowed=ROLES[ROLE].nav; var mods=[];
    NAV.forEach(function(g){ g.items.forEach(function(it){ if(allowed==='all'||allowed.indexOf(it.id)>=0) mods.push(it.l); }); });
    var chips='<div class="chips">'+mods.map(function(m){ return '<span class="chip" style="cursor:default">'+esc(m)+'</span>'; }).join('')+'</div>';
    return '<h2 class="vt">Your profile</h2><div class="vsub">Who you are in the Hub, and what you can see.</div>'
      +'<div class="card" style="display:flex;align-items:center;gap:14px"><span class="av" style="width:48px;height:48px;font-size:1rem">'+esc(ini)+'</span><div><div style="font-family:var(--serif);font-weight:700;font-size:1.2rem">'+esc(who[0])+'</div><div style="color:var(--muted)">'+esc(who[1])+(allowed==='all'?' ┬Ę full access':'')+'</div></div></div>'
      +'<div class="secttl">What this role can access</div>'+chips
      +'<div class="card" style="margin-top:16px;color:var(--muted);font-size:.86rem">Truthfully: you\'re signed in on the shared admin key that you and Georgina use to build this out, so this is a role preview, not a personal account yet. Individual logins, each person with their own secure sign-in and exactly their role\'s access, are on the roadmap. Use "View as" at the top to preview any role.</div>'
      +'<button class="btn" style="margin-top:16px" onclick="grLogout()">Sign out</button>';
  }
  function viewFor(id){
    if(id==='profile')return viewProfile();
    if(id==='home')return roleHome(); if(id==='connections')return viewConnections(); if(id==='ask')return viewAsk();
    if(id==='enquiries')return viewEnquiries(); if(id==='listings')return viewListings(); if(id==='reviews')return viewReviews(); if(id==='roadmap')return viewRoadmap();
    return viewSoon(id);
  }

  window.grAsk=function(q){
    q=(q==null?'':String(q)).trim(); if(!q||ASKING) return;
    var inp=document.getElementById('askin'); if(inp) inp.value='';
    ASKLOG.unshift({q:q,a:null}); ASKING=true;
    if(ROUTE!=='ask'){ location.hash='ask'; } else { renderView(false); }
    fetch('/api/hub-ask',{method:'POST',headers:{'content-type':'application/json','x-admin-key':key()},body:JSON.stringify({q:q})})
      .then(function(r){return r.json();}).then(function(d){ ASKLOG[0].a=(d&&d.answer)||'No answer.'; }).catch(function(){ ASKLOG[0].a='Sorry, I couldn\'t reach the assistant just now.'; })
      .then(function(){ ASKING=false; if(ROUTE==='ask') renderView(false); });
  };

  function renderShell(){
    computeRag();
    var who=WHO[ROLE]||['Georgina','Owner']; var ini=who[0].split(/\s+/).map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase();
    var acct='<div class="acct" onclick="grGo(\'profile\')" style="cursor:pointer" title="Your profile"><span class="av">'+esc(ini)+'</span><span class="who"><b>'+esc(who[0])+'</b><span>'+esc(who[1])+'</span></span></div>';
    var rs='<label class="vlab">View as</label><select class="rolesel" onchange="grRole(this.value)" title="Preview a role view">'+Object.keys(ROLES).map(function(k){ return '<option value="'+k+'"'+(k===ROLE?' selected':'')+'>'+esc(ROLES[k].label)+'</option>'; }).join('')+'</select>';
    root.innerHTML='<div class="ovl" id="ovl" onclick="grToggleNav()"></div><div class="shell"><aside class="side" id="side">'+navHTML()+'</aside><div class="main">'
      +'<div class="askwrap"><button class="btn menu-b" onclick="grToggleNav()">Ōś░</button><div class="ask"><span class="sp">Ō£”</span><input id="askin" placeholder="Ask Georgina: how many enquiries this week?" onkeydown="if(event.key===\'Enter\')grAsk(this.value)"><button onclick="grAsk(document.getElementById(\'askin\').value)">Ask</button></div>'+acct+rs+'<button class="btn" onclick="grLogout()">Sign out</button></div>'
      +'<div class="view" id="view">'+viewFor(ROUTE)+'</div></div></div>';
    updateActive();
  }

  function boot(){
    if(!key()){ gate(); return; }
    root.innerHTML='<div class="gate"><h1>G.R. Estates Hub</h1><p>Loading your command centreŌĆ”</p></div>';
    var hk={'x-admin-key':key()};
    Promise.all([
      fetch('/api/leads',{headers:hk}).then(function(r){ if(r.status===403) throw 'auth'; return r.json(); }),
      fetch('/api/hub',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/reviews').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/social').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/team').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/branches',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;})
    ]).then(function(res){
      var d=res[0]||{}; D.leads=(d&&d.leads)||[]; D.stats=(d&&d.stats)||{};
      D.portfolio=(res[1]&&res[1].portfolio)||null; D.listingsAt=(res[1]&&res[1].listings_at)||null; D.reviews=res[2]||null; D.socialOk=!!(res[3]&&res[3].posts&&res[3].posts.length);
      D.team=(res[4]&&res[4].members)||null; D.branches=(res[5]&&res[5].branches)||null;
      var id=(location.hash||'').replace(/^#/,''); if(id&&(findItem(id)||id==='profile')&&roleAllows(id)) ROUTE=id;
      renderShell();
    }).catch(function(e){
      if(e==='auth'){ try{ localStorage.removeItem('grAdminKey'); }catch(_){} gate('That key didn\'t work, try again.'); }
      else { gate('Couldn\'t load the hub, try again.'); }
    });
  }
  window.addEventListener('hashchange', function(){ if(document.getElementById('view')) onHash(); });
  boot();
})();
</script>
