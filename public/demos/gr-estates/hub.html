<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Hub · G.R. Estates</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
 :root{--ink:#2c2e33;--orange:#e2672a;--orange-deep:#c2541d;--cream:#edeae6;--paper:#fff;--line:#e1dace;--muted:#76726b;--panel:#e7e1d8;--sans:'Inter',-apple-system,sans-serif;--serif:'Quicksand',sans-serif;--g:#1d9e75;--a:#e0992a;--r:#d2492b}
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased}
 a{color:inherit;text-decoration:none}
 .gate{max-width:380px;margin:90px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center}
 .gate h1{font-family:var(--serif);font-size:1.3rem;margin-bottom:6px}.gate p{color:var(--muted);font-size:.9rem;margin-bottom:16px}
 .gate input{width:100%;border:1px solid var(--line);border-radius:10px;padding:.7rem .8rem;font:inherit;margin-bottom:12px}
 .btn{font:inherit;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:.5rem .9rem;cursor:pointer}
 .btn-p{background:var(--orange);color:#fff;border-color:var(--orange)}.btn-p:hover{background:var(--orange-deep)}
 .shell{display:grid;grid-template-columns:214px 1fr;min-height:100vh}
 .side{background:var(--panel);border-right:1px solid #ddd5c8;padding:14px 11px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
 .sidescroll{flex:1;overflow:auto;min-height:0;margin:0 -2px;padding:0 2px}
 .brand{display:flex;align-items:center;gap:8px;font-family:var(--serif);font-weight:700;font-size:1.08rem;padding:4px 8px 10px}.brand .k{color:var(--orange)}
 .gl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:13px 8px 4px}
 .nv{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px;font-size:.86rem;color:#52555c;cursor:pointer}
 .nv:hover{background:rgba(255,255,255,.5)}
 .nv.on{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 4px rgba(44,46,51,.07)}
 .nv .ic{width:17px;text-align:center;flex:none;opacity:.8}
 .dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex:none}
 .main{min-width:0;display:flex;flex-direction:column}
 .askwrap{position:sticky;top:0;background:rgba(237,234,230,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:11px 22px;z-index:5;display:flex;align-items:center;gap:9px}
 .menu-b{display:none}
 .ask{flex:1;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:.5rem .8rem;max-width:600px}
 .ask input{flex:1;border:0;outline:0;font:inherit;background:none;color:var(--ink)}
 .ask .sp{color:var(--orange)}
 .ask button{border:0;background:var(--orange);color:#fff;font:inherit;font-weight:600;font-size:.82rem;border-radius:8px;padding:.35rem .8rem;cursor:pointer}
 .rolesel{font:inherit;font-size:.78rem;border:1px solid var(--line);background:#fff;border-radius:9px;padding:.42rem .5rem;color:var(--ink);max-width:130px}
 .vlab{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
 .acct{display:flex;align-items:center;gap:8px}
 .av{width:30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.72rem;font-family:var(--serif);flex:none}
 .who{display:flex;flex-direction:column;line-height:1.15}.who b{font-size:.82rem;font-weight:600}.who span{font-size:.68rem;color:var(--muted)}
 .sidefoot{flex:none;padding-top:12px;border-top:1px solid #ddd5c8}
 .userblock{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px;cursor:pointer}.userblock:hover{background:rgba(255,255,255,.55)}
 .footrow{display:flex;align-items:center;gap:8px;margin-top:8px}
 .footrow .rolesel{flex:1;max-width:none}
 .signout{padding:.45rem .62rem;flex:none}
 .exitp{flex:1;background:var(--orange);color:#fff;border-color:var(--orange);text-align:center}
 .srcline{margin-top:24px;padding-top:12px;border-top:1px dashed var(--line);color:var(--muted);font-size:.78rem;display:flex;align-items:center;gap:7px}
 .staffg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:11px}
 .strow{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .av.sm{width:36px;height:36px;font-size:.8rem}
 .pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:13px}
 .pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 16px;box-shadow:0 6px 18px rgba(44,46,51,.05);text-align:center}
 .pav{width:62px;height:62px;border-radius:50%;margin:0 auto 11px;display:grid;place-items:center;background:#2b3645 center/cover no-repeat;color:#fff;font-weight:700;font-family:var(--serif);font-size:1.1rem}
 .pav.ini{background:var(--orange)}
 .pn{font-weight:600;font-size:1rem}.pt{color:var(--muted);font-size:.84rem;margin-top:1px}
 .pd{display:inline-block;margin-top:8px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--orange-deep);background:rgba(226,103,42,.1);padding:.15rem .55rem;border-radius:20px}
 .pcc{margin-top:11px;padding-top:10px;border-top:1px solid var(--line);text-align:left;display:grid;gap:4px}
 .pc{font-size:.8rem;color:#54585f;display:flex;gap:7px;align-items:center}.pc span{opacity:.6}
 .livehead{display:flex;align-items:center;gap:8px;margin:2px 0 14px;color:var(--muted);font-size:.82rem}
 .livedot{width:9px;height:9px;border-radius:50%;background:var(--g);flex:none;animation:pulse 2s infinite}
 @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.45)}70%{box-shadow:0 0 0 8px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}
 .feedrow{display:flex;gap:11px;align-items:flex-start;padding:12px 2px;border-top:1px solid var(--line)}.feedrow:first-of-type{border-top:0}
 .feedrow .fic{width:30px;height:30px;border-radius:50%;background:rgba(226,103,42,.12);color:var(--orange-deep);display:grid;place-items:center;flex:none;font-size:.9rem}
 .feedrow .ft{margin-left:auto;color:var(--muted);font-size:.76rem;white-space:nowrap}
 .view{padding:20px 22px 64px;max-width:1080px}
 h2.vt{font-family:var(--serif);font-weight:700;font-size:1.5rem;letter-spacing:-.01em}
 .vsub{color:var(--muted);font-size:.9rem;margin-top:2px;margin-bottom:18px}
 .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:13px;margin-bottom:8px}
 .tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .tile.acc{background:linear-gradient(155deg,#fff,#fbf1e9)}
 .tile .n{font-family:var(--serif);font-weight:700;font-size:1.65rem;line-height:1.05}
 .tile .n .st{color:var(--g);font-size:.9rem;font-weight:600}
 .tile .l{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
 .secttl{font-family:var(--serif);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:26px 0 11px}
 .cols{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:14px}
 .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 17px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .card h3{font-family:var(--serif);font-size:1.02rem;margin-bottom:8px}
 .row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--line);font-size:.86rem}.row:first-of-type{border-top:0}
 .row .ic{width:16px;flex:none;opacity:.7;margin-top:1px}.row .tm{margin-left:auto;color:var(--muted);font-size:.78rem;white-space:nowrap}
 .kind{font-size:.7rem;font-weight:700;padding:.1rem .45rem;border-radius:6px;background:rgba(226,103,42,.12);color:var(--orange-deep);text-transform:capitalize}
 table.enq{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:.86rem;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 table.enq th,table.enq td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
 table.enq th{background:#faf7f2;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
 table.enq tr:last-child td{border-bottom:0}
 .ok{color:#1d9e75;font-weight:700;white-space:nowrap}.no{color:var(--orange-deep);font-weight:700;white-space:nowrap}
 .efilt{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
 .sysg{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
 .sys{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:0 6px 18px rgba(44,46,51,.05)}
 .sys .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
 .sys .nm{font-weight:600;font-size:.92rem}
 .rag{font-size:.68rem;font-weight:700;padding:.12rem .45rem;border-radius:20px}
 .rag.g{background:rgba(29,158,117,.14);color:#157a59}.rag.a{background:rgba(224,153,42,.16);color:#9a6612}.rag.r{background:rgba(210,73,43,.14);color:var(--orange-deep)}.rag.n{background:rgba(118,114,107,.14);color:#5f5b53}
 .sys .dta{font-size:.8rem;color:#54585f;margin-top:7px}.sys .fr{font-size:.72rem;color:var(--muted);margin-top:3px}
 .road{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
 .rcol{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 15px}
 .rcol h4{font-family:var(--serif);font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px;font-weight:700}
 .rdot{width:8px;height:8px;border-radius:50%;flex:none}.ritem{font-size:.84rem;padding:7px 0;border-top:1px solid var(--line);color:#43464d}.ritem:first-of-type{border-top:0}
 .brow{display:grid;grid-template-columns:84px 1fr 30px;align-items:center;gap:9px;font-size:.84rem;margin:8px 0}
 .bar{height:9px;background:#efe7dd;border-radius:5px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-deep))}
 .branch{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line)}.branch:first-of-type{border-top:0}
 .branch .sc{font-family:var(--serif);font-weight:700}.branch .sc b{color:var(--orange)}
 .chips{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 2px}
 .chip{font-size:.78rem;color:#54585f;background:#faf7f2;border:1px solid var(--line);border-radius:20px;padding:.3rem .7rem;cursor:pointer}.chip:hover{border-color:var(--orange)}.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
 .qa{margin:14px 0}.qq{font-weight:600;margin-bottom:5px}.aa{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;white-space:pre-wrap;font-size:.92rem;line-height:1.6}
 .soon{background:#fff;border:1px dashed var(--line);border-radius:16px;padding:46px 30px;text-align:center;color:var(--muted)}
 .soon .bg{font-family:var(--serif);font-size:1.3rem;color:var(--ink);margin:6px 0}
 .soon .tag{display:inline-block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--orange-deep);background:rgba(226,103,42,.1);padding:.2rem .6rem;border-radius:20px;margin-top:10px}
 .ovl{display:none}
 @media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:240px;transform:translateX(-100%);transition:.22s;z-index:40}
  .side.open{transform:none}
  .menu-b{display:inline-flex}
  .cols{grid-template-columns:1fr}.road{grid-template-columns:1fr 1fr}.rolesel{max-width:120px}
  .ovl.show{display:block;position:fixed;inset:0;background:rgba(20,20,20,.35);z-index:35}
 }
 @media(max-width:480px){.road{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  var root=document.getElementById('root');
  var ROUTE='home', D={}, NAVOPEN=false, ASKLOG=[], ASKING=false, ENQFILTER='all', ROLE='owner';
  function key(){ try{ return localStorage.getItem('grAdminKey')||''; }catch(e){ return ''; } }
  function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function money(n){ if(n==null||isNaN(n)) return '—'; return '£'+Math.round(n).toLocaleString('en-GB'); }
  function ago(ts){ if(!ts) return ''; var s=Math.floor((Date.now()-ts)/1000); if(s<60)return 'just now'; var m=Math.floor(s/60); if(m<60)return m+' min ago'; var h=Math.floor(m/60); if(h<24)return h+' hr ago'; var d=Math.floor(h/24); return d+' day'+(d>1?'s':'')+' ago'; }
  function fmt(ts){ if(!ts)return ''; var d=new Date(ts); return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
  function initials(n){ return (n||'').split(/\s+/).map(function(x){return x[0]||'';}).join('').slice(0,2).toUpperCase(); }
  function srcLine(id){ return '<div class="srcline"><span aria-hidden="true">⚯</span> Data, '+esc(SRC[id]||'from the relevant system.')+'</div>'; }

  window.grLogout=function(){ try{ localStorage.removeItem('grAdminKey'); }catch(e){} boot(); };
  window.grSave=function(){ var el=document.getElementById('k'); var v=el?el.value:''; try{ localStorage.setItem('grAdminKey',(v||'').trim()); }catch(e){} boot(); };
  function gate(err){
    root.innerHTML='<div class="gate"><h1>G.R. Estates Hub</h1><p>Your command centre. Enter the admin key to continue.</p><input id="k" type="password" placeholder="Admin key" autocomplete="off">'+(err?'<p style="color:#c2541d">'+esc(err)+'</p>':'')+'<button class="btn btn-p" style="width:100%" onclick="grSave()">Open hub</button></div>';
    var i=document.getElementById('k'); if(i){ i.focus(); i.addEventListener('keydown',function(e){ if(e.key==="Enter") grSave(); }); }
  }

  var NAV=[
    {g:'Overview',items:[{id:'home',l:'Home',ic:'⌂',rag:'g'},{id:'connections',l:'Connections',ic:'⚯',rag:'a'},{id:'ask',l:'Ask Georgina',ic:'✦',rag:'g'}]},
    {g:'Pipeline',items:[{id:'enquiries',l:'Enquiries',ic:'✉',rag:'g'},{id:'valuations',l:'Valuations',ic:'£',rag:'g'},{id:'viewings',l:'Viewings',ic:'◷',rag:'g'},{id:'progression',l:'Progression',ic:'↗',rag:'g'}]},
    {g:'People',items:[{id:'contacts',l:'Contacts',ic:'☰',rag:'g'},{id:'calendar',l:'Calendar',ic:'▦',rag:'g'}]},
    {g:'Property',items:[{id:'listings',l:'Listings',ic:'⌂',rag:'g'},{id:'map',l:'Map',ic:'◎',rag:'g'},{id:'marketing',l:'Marketing',ic:'◈',rag:'a'}]},
    {g:'Lettings',items:[{id:'tenancies',l:'Tenancies',ic:'⚿',rag:'g'},{id:'maintenance',l:'Maintenance',ic:'✸',rag:'a'}]},
    {g:'Services',items:[{id:'removals',l:'Removals',ic:'⊟',rag:'g'},{id:'mortgages',l:'Mortgages',ic:'%',rag:'n'}]},
    {g:'Money',items:[{id:'accounts',l:'Accounts',ic:'$',rag:'g'},{id:'compliance',l:'Compliance',ic:'✓',rag:'a'}]},
    {g:'Insight',items:[{id:'analytics',l:'Analytics',ic:'▤',rag:'g'},{id:'reviews',l:'Reviews',ic:'★',rag:'g'}]},
    {g:'Team',items:[{id:'staff',l:'Staff',ic:'☺',rag:'g'},{id:'feed',l:'Company feed',ic:'❏',rag:'g'},{id:'roadmap',l:'Roadmap',ic:'➔',rag:'g'}]},
    {g:'',items:[{id:'settings',l:'Settings',ic:'⚙',rag:'g'}]}
  ];
  var SOON={
    valuations:'Booked valuations, the diary and outcomes, from Street.',viewings:'Every viewing, with feedback collected automatically.',
    progression:'Sales from offer to completion, with chain status.',contacts:'Buyers, sellers, landlords and tenants in one place.',
    calendar:'Appointments, viewings, valuations and key dates.',marketing:'Rightmove, OnTheMarket and social performance, plus what needs a post.',
    tenancies:'Live tenancies, renewals and rent.',maintenance:'Works orders and contractor jobs.',
    removals:'G.R. Removals jobs, bookings and its 5.0-star reviews.',mortgages:'Mortgage referrals and outcomes.',
    accounts:'Client money, landlord statements and invoices.',compliance:'Gas, EICR and EPC tracking, plus AML checks.',
    analytics:'Trends, comparisons and snapshot views you can pin.',staff:'The team, roles and performance.',
    feed:'Live company wins, everyone sees their own feed.',map:'Branches and properties plotted on a map.',settings:'People and access, plus integrations.'
  };
  var SRC={
    home:'Live from Street (listings, team, branches), Google reviews and the website.',
    connections:'Live status and timestamps from each connected system.',
    ask:'Answers from your live Street, reviews and website data.',
    enquiries:'Live from the website, flowing into Street.',
    listings:'Live from Street, via the property database.',
    reviews:'Live from your Google Business profiles.',
    roadmap:'Maintained by you and Dean.',
    staff:'Live from Street (your team records).',
    profile:'Your role and access in the Hub.',
    valuations:'Will pull from Street (valuations and the diary).',
    viewings:'Will pull from Street (viewings and feedback).',
    progression:'Will pull from Street (sales progression and chains).',
    contacts:'Will pull from Street (all contacts).',
    calendar:'Will pull from Street (appointments and key dates).',
    marketing:'Will pull from the portals (Rightmove, OnTheMarket) and Meta.',
    tenancies:'Will pull from Street (tenancies and rent).',
    maintenance:'Will pull from Street and your maintenance system.',
    removals:'Will pull from G.R. Removals (jobs, bookings, reviews).',
    mortgages:'Will pull from your mortgage referrals.',
    accounts:'Will pull from Street client accounts and your accounting.',
    compliance:'Will pull from Street (certificates) and your AML checks.',
    analytics:'Will be computed from your live Hub data.',
    feed:'Live from website enquiries and activity across the business.',
    settings:'People, access and integration settings.',
    map:'Will plot your branches and property locations from Street.'
  };
  var PLAN=[
    {t:'New website + live listings',s:'live'},{t:'Leads into Street',s:'live'},{t:'Live Google reviews',s:'live'},{t:'Ask Georgina (AI)',s:'live'},
    {t:'Saved + recently viewed',s:'live'},{t:'Instant valuation funnel',s:'live'},{t:'Be-first property alerts',s:'live'},{t:'The Hub app',s:'live'},
    {t:'Ask Georgina inside the Hub',s:'now'},{t:'Connections / healthcheck',s:'now'},{t:'Shareable URLs + role views',s:'now'},
    {t:'Branch routing for leads',s:'next'},{t:'Role dashboards',s:'next'},{t:'Company feed',s:'next'},
    {t:'AI front desk (phone)',s:'later'},{t:'Per-user logins + roles',s:'later'},{t:'Make it G.R.-owned + go live',s:'later'}
  ];
  var ROLES={
    owner:{label:'Owner',nav:'all',home:'owner'},
    manager:{label:'Manager',nav:['home','connections','ask','enquiries','valuations','viewings','progression','contacts','calendar','listings','map','marketing','tenancies','maintenance','removals','accounts','compliance','analytics','reviews','staff','feed','roadmap'],home:'owner'},
    negotiator:{label:'Negotiator',nav:['home','ask','enquiries','viewings','contacts','calendar','listings','map','reviews','feed','roadmap'],home:'nego'},
    marketing:{label:'Marketing',nav:['home','ask','marketing','listings','map','reviews','analytics','feed','roadmap'],home:'marketing'},
    accounts:{label:'Accounts',nav:['home','ask','accounts','compliance','reviews','feed','roadmap'],home:'accounts'}
  };
  var WHO={owner:['Georgina','Owner'],manager:['Branch manager','Manager'],negotiator:['Negotiator','Sales / lettings'],marketing:['Tia','Marketing'],accounts:['Rosie','Accounts']};

  function ragColor(c){ return c==='g'?'var(--g)':c==='a'?'var(--a)':c==='r'?'var(--r)':'var(--muted)'; }
  function findItem(id){ for(var i=0;i<NAV.length;i++)for(var j=0;j<NAV[i].items.length;j++) if(NAV[i].items[j].id===id) return NAV[i].items[j]; return null; }
  function roleAllows(id){ if(id==='profile') return true; var n=ROLES[ROLE].nav; return n==='all'||n.indexOf(id)>=0; }
  function computeRag(){
    for(var i=0;i<NAV.length;i++)for(var j=0;j<NAV[i].items.length;j++){ var it=NAV[i].items[j];
      if(it.id==='connections') it.rag=(D.socialOk?'g':'a');
      if(it.id==='marketing') it.rag=(D.socialOk?'g':'r');
      if(it.id==='enquiries'){ var L=D.leads||[]; var pct=L.length?Math.round(L.filter(function(x){return x.streetOk;}).length/L.length*100):100; it.rag=pct>=100?'g':'a'; }
    }
  }

  window.grGo=function(id){ if(!roleAllows(id)) id='home'; if(('#'+id)===location.hash){ onHash(); } else { location.hash=id; } };
  window.grToggleNav=function(){ NAVOPEN=!NAVOPEN; var s=document.getElementById('side'); var o=document.getElementById('ovl'); if(s)s.classList.toggle('open',NAVOPEN); if(o)o.classList.toggle('show',NAVOPEN); };
  window.grRole=function(v){ if(!ROLES[v]) return; ROLE=v; if(!roleAllows(ROUTE)) ROUTE='home'; ENQFILTER='all'; renderShell(); if(('#'+ROUTE)!==location.hash){ location.hash=ROUTE; } };
  window.grEnqFilter=function(f){ ENQFILTER=f; renderView(false); };

  function onHash(){
    var id=(location.hash||'').replace(/^#/,'')||'home';

      +'<div class="card" style="margin-top:16px;color:var(--muted);font-size:.86rem">Truthfully: you\'re signed in on the shared admin key that you and Georgina use to build this out, so this is a role preview, not a personal account yet. Individual logins, each person with their own secure sign-in and exactly their role\'s access, are on the roadmap. Use "View as" at the top to preview any role.</div>'
      +'<button class="btn" style="margin-top:16px" onclick="grLogout()">Sign out</button>';
  }
  function viewFor(id){
    var body;
    if(id==='profile')body=viewProfile();
    else if(id==='home')body=roleHome();
    else if(id==='connections')body=viewConnections();
    else if(id==='ask')body=viewAsk();
    else if(id==='enquiries')body=viewEnquiries();
    else if(id==='listings')body=viewListings();
    else if(id==='reviews')body=viewReviews();
    else if(id==='roadmap')body=viewRoadmap();
    else if(id==='staff')body=viewStaff();
    else if(id==='feed')body=viewFeed();
    else body=viewSoon(id);
    return body+srcLine(id);
  }

  window.grAsk=function(q){
    q=(q==null?'':String(q)).trim(); if(!q||ASKING) return;
    var inp=document.getElementById('askin'); if(inp) inp.value='';
    ASKLOG.unshift({q:q,a:null}); ASKING=true;
    if(ROUTE!=='ask'){ location.hash='ask'; } else { renderView(false); }
    fetch('/api/hub-ask',{method:'POST',headers:{'content-type':'application/json','x-admin-key':key()},body:JSON.stringify({q:q})})
      .then(function(r){return r.json();}).then(function(d){ ASKLOG[0].a=(d&&d.answer)||'No answer.'; }).catch(function(){ ASKLOG[0].a='Sorry, I couldn\'t reach the assistant just now.'; })
      .then(function(){ ASKING=false; if(ROUTE==='ask') renderView(false); });
  };

  function renderShell(){
    computeRag();
    root.innerHTML='<div class="ovl" id="ovl" onclick="grToggleNav()"></div><div class="shell"><aside class="side" id="side"><div class="brand" onclick="grGo(\'home\')" style="cursor:pointer" title="Home"><span>G.<span class="k">R.</span> Hub</span></div><div class="sidescroll">'+navHTML()+'</div>'+footHTML()+'</aside><div class="main">'
      +'<div class="askwrap"><button class="btn menu-b" onclick="grToggleNav()">☰</button><div class="ask"><span class="sp">✦</span><input id="askin" placeholder="Ask Georgina: how many enquiries this week?" onkeydown="if(event.key===\'Enter\')grAsk(this.value)"><button onclick="grAsk(document.getElementById(\'askin\').value)">Ask</button></div></div>'
      +'<div class="view" id="view">'+viewFor(ROUTE)+'</div></div></div>';
    updateActive();
    if(ROUTE==='feed') startFeed(); else stopFeed();
  }

  function boot(){
    if(!key()){ gate(); return; }
    root.innerHTML='<div class="gate"><h1>G.R. Estates Hub</h1><p>Loading your command centre…</p></div>';
    var hk={'x-admin-key':key()};
    Promise.all([
      fetch('/api/leads',{headers:hk}).then(function(r){ if(r.status===403) throw 'auth'; return r.json(); }),
      fetch('/api/hub',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/reviews').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/social').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/team').then(function(r){return r.json();}).catch(function(){return null;}),
      fetch('/api/branches',{headers:hk}).then(function(r){return r.json();}).catch(function(){return null;})
    ]).then(function(res){
      var d=res[0]||{}; D.leads=(d&&d.leads)||[]; D.stats=(d&&d.stats)||{};
      D.portfolio=(res[1]&&res[1].portfolio)||null; D.listingsAt=(res[1]&&res[1].listings_at)||null; D.reviews=res[2]||null; D.socialOk=!!(res[3]&&res[3].posts&&res[3].posts.length);
      D.team=(res[4]&&res[4].members)||null; D.branches=(res[5]&&res[5].branches)||null;
      var id=(location.hash||'').replace(/^#/,''); if(id&&(findItem(id)||id==='profile')&&roleAllows(id)) ROUTE=id;
      renderShell();
    }).catch(function(e){
      if(e==='auth'){ try{ localStorage.removeItem('grAdminKey'); }catch(_){} gate('That key didn\'t work, try again.'); }
      else { gate('Couldn\'t load the hub, try again.'); }
    });
  }
  window.addEventListener('hashchange', function(){ if(document.getElementById('view')) onHash(); });
  boot();
})();
</script>
</body>
</html>
